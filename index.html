<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#171430" />
<title>하젤 키우기 — Quantum Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --night: #171430; --night2: #221D45; --panel: #2A2452;
    --gold: #E8B44C; --gold-dim: #8E7434; --gold-soft: #F2D389;
    --parchment: #F3E7C9; --parchment2: #E9D9B2; --ink: #3D3322; --ink-soft: #6E5F45;
    --exp: #7FBF6A; --hot: #E0685C; --text: #EFE9DC; --text-dim: #A89DC4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #2B2455 0%, var(--night) 55%) fixed var(--night);
    color: var(--text);
    font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 14px; word-break: keep-all;
  }
  .rpg { min-height: 100vh; position: relative; display: flex; justify-content: center;
         padding: max(20px, env(safe-area-inset-top)) 16px 60px; }
  .wrap { width: 100%; max-width: 430px; position: relative; z-index: 1; }

  /* 밤하늘 별 */
  .stars { position: fixed; inset: 0; pointer-events: none; opacity: .7;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 18%, #FFF8E0 50%, transparent 51%),
      radial-gradient(1px 1px at 78% 9%, #FFF8E0 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 64% 26%, #F2D389 50%, transparent 51%),
      radial-gradient(1px 1px at 31% 7%, #FFF8E0 50%, transparent 51%),
      radial-gradient(1px 1px at 89% 33%, #FFF8E0 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 45% 14%, #FFF8E0 50%, transparent 51%),
      radial-gradient(1px 1px at 8% 41%, #F2D389 50%, transparent 51%),
      radial-gradient(1px 1px at 95% 19%, #FFF8E0 50%, transparent 51%);
    animation: twinkle 4s ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: .45; } to { opacity: .8; } }
  @media (prefers-reduced-motion: reduce) { .stars, .dog-idle, .dog-bounce, .dog-tail, .victory-burst { animation: none !important; } }

  /* 시그니처: JRPG 금테 프레임 (모서리 징) */
  .frame { position: relative; background: linear-gradient(180deg, var(--panel), var(--night2));
           border: 2px solid var(--gold-dim); border-radius: 10px;
           box-shadow: inset 0 0 0 1.5px rgba(232,180,76,.25), 0 6px 18px rgba(0,0,0,.35); }
  .frame::before, .frame::after { content: ""; position: absolute; width: 7px; height: 7px;
           background: var(--gold); border-radius: 50%; box-shadow: 0 0 0 2px var(--night2); }
  .frame::before { top: -4px; left: -4px; }
  .frame::after { top: -4px; right: -4px; }

  .screen-label { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; color: var(--gold);
                  letter-spacing: .12em; font-size: 14px; text-align: center; margin-bottom: 12px; }
  .sec-label { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; color: var(--gold-soft);
               font-size: 14px; margin: 18px 0 8px; }

  /* 타이틀 */
  .title-wrap { text-align: center; padding-top: 8vh; }
  .title-eyebrow { letter-spacing: .42em; font-size: 11px; color: var(--text-dim); }
  .game-title { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 52px; line-height: 1.15;
                color: var(--gold); text-shadow: 0 3px 0 #6B541F, 0 10px 30px rgba(232,180,76,.35); margin: 6px 0 8px; }
  .title-sub { color: var(--text-dim); font-size: 13.5px; }
  .title-dog { margin: 26px 0 8px; }
  .title-foot { margin-top: 26px; color: var(--text-dim); font-size: 12px; }

  /* HUD */
  .hud { padding: 13px 15px 12px; margin-bottom: 12px; }
  .hud-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .hud-hero { flex: 1; min-width: 0; }
  .hud-name { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 20px; color: #FFF6E3; }
  .hud-lv { color: var(--gold); font-size: 15px; }
  .hud-title { font-size: 11.5px; color: var(--text-dim); }
  .hud-gold { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; color: var(--gold-soft); font-size: 16px; white-space: nowrap; }
  .bar { height: 12px; background: #14112B; border: 1.5px solid var(--gold-dim); border-radius: 99px; overflow: hidden; }
  .bar.wide { margin-top: 16px; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
  .bar-fill.exp { background: linear-gradient(90deg, #9BD37F, var(--exp)); box-shadow: 0 0 10px rgba(127,191,106,.6); }
  .bar-txt { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

  /* 동료 카드 */
  .dogcard { display: flex; align-items: center; gap: 8px; padding: 10px 14px; margin-bottom: 12px; }
  .dogcard-info { min-width: 0; }
  .dogcard-name { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 16px; color: #FFF6E3; }
  .dogcard-stage { font-size: 11.5px; color: var(--text-dim); }
  .dog-idle { animation: breathe 3.2s ease-in-out infinite; transform-origin: 50% 90%; }
  @keyframes breathe { 0%,100% { transform: scale(1);} 50% { transform: scale(1.03);} }
  .dog-bounce { animation: hop .7s ease-in-out infinite; transform-origin: 50% 100%; }
  @keyframes hop { 0%,100% { transform: translateY(0);} 40% { transform: translateY(-7px) rotate(-2deg);} }
  .dog-tail { transform-origin: 97px 78px; animation: wag .9s ease-in-out infinite; }
  @keyframes wag { 0%,100% { transform: rotate(0);} 50% { transform: rotate(14deg);} }

  /* 긴급 의뢰 */
  .urgent { display: flex; align-items: center; gap: 9px; width: 100%; padding: 12px 14px; margin-bottom: 12px;
            cursor: pointer; color: var(--text); text-align: left; font-family: inherit; font-size: 13.5px; }
  .urgent-label { font-family: 'Jua', sans-serif; color: var(--hot); font-size: 12.5px; white-space: nowrap; }
  .urgent-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .dd { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 12px; padding: 3px 10px;
        border-radius: 99px; white-space: nowrap; border: 1.5px solid; }
  .dd.hot { color: #FFB3AB; border-color: #B5544A; background: rgba(224,104,92,.16); }
  .dd.warm { color: var(--gold-soft); border-color: var(--gold-dim); background: rgba(232,180,76,.12); }
  .dd.free { color: #A8D49A; border-color: #5E8A52; background: rgba(127,191,106,.12); }

  /* 봉인 */
  .sealed { padding: 12px 14px; margin-bottom: 9px; }
  .sealed-task { font-size: 13px; line-height: 1.55; }
  .sealed-reason { font-size: 11.5px; color: var(--hot); margin-top: 4px; }
  .sealed-acts { display: flex; gap: 7px; margin-top: 10px; }

  /* 버튼 */
  .btn-main { display: block; width: 100%; padding: 17px; margin-top: 16px; border: 2px solid var(--gold);
              border-radius: 12px; cursor: pointer;
              background: linear-gradient(180deg, #F2CD7B, var(--gold) 55%, #C8922F);
              color: #3A2B07; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 20px;
              box-shadow: 0 5px 0 #6B541F, 0 14px 28px rgba(232,180,76,.28); transition: transform .08s, box-shadow .08s; }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 1px 0 #6B541F; }
  .btn-main:disabled { opacity: .4; }
  .btn-main.slim { margin-top: 0; flex: 1.6; font-size: 17px; padding: 14px; }
  .btn-board { display: block; width: 100%; padding: 12px; margin-top: 11px; border-radius: 11px; cursor: pointer;
               background: transparent; border: 1.5px dashed #564C85; color: var(--text-dim);
               font-size: 13px; font-family: inherit; }
  .btn-sub { padding: 10px 14px; border-radius: 9px; cursor: pointer; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
             font-size: 14px; border: 1.5px solid #564C85; background: #201B40; color: var(--text-dim); }
  .btn-sub.gold { border-color: var(--gold); background: rgba(232,180,76,.15); color: var(--gold-soft); }
  .btn-sub.green { border-color: #5E8A52; background: rgba(127,191,106,.15); color: #A8D49A; }
  .btn-sub:disabled { opacity: .4; }
  .btn-weaken { flex: 1; padding: 10px 8px; border: 2px solid #7B68C9; border-radius: 12px; cursor: pointer;
                background: linear-gradient(180deg, #3A3170, #2A2452); color: #C9BCF5;
                font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 14.5px; line-height: 1.3;
                box-shadow: 0 4px 0 #463A85; }
  .btn-weaken span { font-family: 'Gowun Dodum', sans-serif; font-size: 10.5px; color: #9D8FD8; }
  .btn-weaken:active { transform: translateY(3px); box-shadow: 0 1px 0 #463A85; }

  /* 모험 일지 */
  .journal { margin-top: 20px; }
  .journal-item { display: flex; gap: 8px; align-items: baseline; padding: 9px 2px;
                  border-bottom: 1px dashed #3E3670; font-size: 12.5px; }
  .journal-date { font-family: 'Jua', sans-serif; color: var(--gold); font-size: 12px; white-space: nowrap; }
  .journal-text { flex: 1; min-width: 0; color: var(--text); line-height: 1.5; }
  .journal-spent { color: var(--text-dim); font-size: 11px; white-space: nowrap; }

  /* 퀘스트 보드 — 양피지 두루마리 */
  .board-hint { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.7; margin-bottom: 14px; }
  .board-hint.small { text-align: left; margin: 6px 0 0; }
  .scroll { background: linear-gradient(180deg, var(--parchment), var(--parchment2));
            border: 2px solid #C9B27E; border-radius: 10px; padding: 13px 14px; margin-bottom: 11px;
            color: var(--ink); box-shadow: 0 4px 0 #A78F5C, 0 10px 20px rgba(0,0,0,.3); position: relative; }
  .scroll::before { content: ""; position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 12px; border-radius: 50%; background: #B5544A;
            box-shadow: inset 0 -2px 3px rgba(0,0,0,.35); }
  .scroll-row { display: flex; align-items: center; gap: 8px; }
  .scroll-main { flex: 1; min-width: 0; }
  .scroll-name { font-size: 14px; font-weight: 700; line-height: 1.45; color: var(--ink); }
  .scroll-note { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; line-height: 1.5; }
  .scroll .dd.hot { color: #9E3B2C; border-color: #C97B6E; background: rgba(224,104,92,.14); }
  .scroll .dd.warm { color: #8A6510; border-color: #C2A35C; background: rgba(232,180,76,.18); }
  .scroll .dd.free { color: #4F7A42; border-color: #8FB781; background: rgba(127,191,106,.16); }
  .ico { width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px; cursor: pointer;
         border: 1.5px solid #C9B27E; background: rgba(255,255,255,.5); color: var(--ink-soft); font-size: 13px; }
  .scroll input { background: #FFFDF4; border: 1.5px solid #C9B27E; color: var(--ink); }
  .scroll input::placeholder { color: #A79468; }
  .editbox { margin-top: 11px; padding-top: 11px; border-top: 1.5px dashed #C9B27E;
             display: flex; flex-direction: column; gap: 8px; }
  .edit-row { display: flex; gap: 8px; }
  .edit-row input[type=date] { flex: 1; min-width: 0; }
  .scroll.new { padding-top: 4px; }
  .scroll.new .sec-label { color: var(--ink-soft); margin-top: 10px; }
  .scroll.new input { margin-bottom: 8px; }
  .scroll.new .edit-row input { margin-bottom: 0; }

  /* 입력 공통 */
  input[type=text], input[type=date], textarea {
    width: 100%; padding: 11px 12px; border-radius: 10px; font-size: 14px;
    font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif; outline: none;
    background: #201B40; border: 1.5px solid #564C85; color: var(--text);
  }
  textarea { min-height: 70px; resize: vertical; }
  textarea:focus, input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(232,180,76,.15); }
  textarea::placeholder, input::placeholder { color: #6F65A0; }

  /* 출전 준비 */
  .opt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
  .opt-grid.three { grid-template-columns: repeat(3, 1fr); }
  .opt { padding: 13px 6px; text-align: center; cursor: pointer; border-radius: 11px;
         background: #201B40; border: 1.5px solid #564C85; color: var(--text); font-family: inherit; }
  .opt b { display: block; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 18px; font-weight: 400; }
  .opt i { font-style: normal; font-size: 10.5px; color: var(--text-dim); }
  .opt.on { border-color: var(--gold); background: rgba(232,180,76,.14); color: var(--gold-soft);
            box-shadow: 0 0 12px rgba(232,180,76,.25); }

  /* 전투 */
  .enemy { padding: 16px 16px 14px; margin-bottom: 12px; }
  .enemy-tag { display: inline-block; font-family: 'Jua', sans-serif; font-size: 12px; color: #C9BCF5;
               border: 1.5px solid #7B68C9; border-radius: 99px; padding: 2px 11px; background: rgba(123,104,201,.15); }
  .enemy-name { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 21px; line-height: 1.45;
                color: #FFF6E3; margin: 10px 0 8px; }
  .enemy-why { font-size: 13px; line-height: 1.75; color: var(--text-dim); margin-bottom: 12px; }
  .first-strike { background: rgba(232,180,76,.1); border: 1.5px dashed var(--gold-dim); border-radius: 10px;
                  padding: 10px 12px; font-size: 13px; line-height: 1.6; color: var(--text); }
  .first-strike b { display: block; font-family: 'Jua', sans-serif; color: var(--gold); font-size: 12px; margin-bottom: 3px; font-weight: 400; }
  .enemy-meta { margin-top: 10px; font-size: 11px; color: var(--text-dim); }
  .timer { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 4px; }
  .timer-t { font-family: 'Jua', sans-serif; font-size: 24px; color: #FFF6E3; letter-spacing: .05em; min-width: 72px; }
  .timer-lbl { flex: 1; min-width: 0; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .battle-acts { display: flex; gap: 9px; margin-top: 13px; }
  .sealbox { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }

  /* 승리 */
  .victory-wrap { text-align: center; padding-top: 7vh; }
  .victory-burst { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 44px; color: var(--gold);
                   text-shadow: 0 3px 0 #6B541F, 0 0 40px rgba(232,180,76,.55);
                   animation: burst .5s cubic-bezier(.2,1.7,.4,1) both; }
  .victory-burst.big { font-size: 50px; color: #FFE9AE; }
  @keyframes burst { from { transform: scale(2.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .victory-dog { margin: 18px 0 6px; }
  .victory-msg, .victory-levelup { font-size: 14px; color: var(--text-dim); line-height: 1.7; }
  .victory-levelup { font-family: 'Jua', sans-serif; color: var(--gold-soft); font-size: 17px; }
  .gain-row { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
  .gain { padding: 12px 22px; }
  .gain b { display: block; font-family: 'Jua', sans-serif; font-size: 24px; color: var(--exp); font-weight: 400; }
  .gain:last-child b { color: var(--gold-soft); }
  .gain i { font-style: normal; font-size: 10.5px; color: var(--text-dim); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ═══════════════════════════════════════
   하젤 키우기 RPG — QUANTUM QUEST
   현실의 행동 1개 = 전투 1승 = 경험치
   ═══════════════════════════════════════ */

const todayKey = () => {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
};
const daysBetween = (a, b) => Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000);
const dday = (dl) => (dl ? daysBetween(todayKey(), dl) : null);
const ddayLabel = (dl) => {
  const n = dday(dl);
  if (n === null) return "자유";
  if (n === 0) return "오늘!";
  return n > 0 ? "D-" + n : Math.abs(n) + "일 지남";
};

/* ── 레벨 시스템: 누적 EXP → 레벨 ── */
const needFor = (lv) => 40 + (lv - 1) * 25; // 해당 레벨에서 다음 레벨까지 필요 EXP
const levelFromExp = (exp) => {
  let lv = 1, rest = exp;
  while (rest >= needFor(lv)) { rest -= needFor(lv); lv++; }
  return { lv, rest, need: needFor(lv) };
};
const HERO_TITLES = [
  [1, "견습 모험가"], [2, "캠프의 새벽지기"], [3, "동네 영웅"], [5, "길드 에이스"],
  [7, "마감 사냥꾼"], [10, "전설의 실행가"], [14, "퀀텀 마스터"],
];
const heroTitle = (lv) => { let t = HERO_TITLES[0][1]; for (const [l, n] of HERO_TITLES) if (lv >= l) t = n; return t; };

/* ── 동료 단추: 레벨 따라 진화 ── */
const DOG_STAGES = [
  { at: 1, title: "아기 솜뭉치" },
  { at: 3, title: "꼬마 정찰견" },
  { at: 6, title: "용맹한 기사견" },
  { at: 10, title: "전설의 황금 수호견" },
];
const dogStageIdx = (lv) => (lv >= 10 ? 3 : lv >= 6 ? 2 : lv >= 3 ? 1 : 0);

function Danchu({ stageIdx, size = 96, happy = false }) {
  const scale = [0.8, 0.9, 1, 1][stageIdx];
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" aria-label="동료 단추">
      <g transform={"translate(60 64) scale(" + scale + ") translate(-60 -64)"} className={happy ? "dog-bounce" : "dog-idle"}>
        <path d="M97 78 Q110 70 106 58" stroke="#C99B53" strokeWidth="8" strokeLinecap="round" fill="none" className="dog-tail" />
        <ellipse cx="72" cy="84" rx="28" ry="20" fill="#E0B36A" />
        <ellipse cx="72" cy="90" rx="18" ry="11" fill="#F2DCB3" />
        <ellipse cx="58" cy="100" rx="7" ry="5" fill="#D8A85C" />
        <ellipse cx="80" cy="100" rx="7" ry="5" fill="#D8A85C" />
        <circle cx="42" cy="58" r="26" fill="#E0B36A" />
        <path d="M22 44 Q12 58 20 72 Q30 66 30 50 Z" fill="#B98445" />
        <path d="M62 44 Q72 58 64 72 Q54 66 54 50 Z" fill="#B98445" />
        <ellipse cx="42" cy="68" rx="13" ry="10" fill="#F2DCB3" />
        <ellipse cx="42" cy="63" rx="4.5" ry="3.5" fill="#3D3322" />
        <circle cx="33" cy="54" r="3" fill="#3D3322" />
        <circle cx="51" cy="54" r="3" fill="#3D3322" />
        <circle cx="34" cy="53" r="1" fill="#FFF" />
        <circle cx="52" cy="53" r="1" fill="#FFF" />
        {happy && <path d="M40 72 Q42 79 46 73 Q44 70 40 72" fill="#E2837B" />}
        {/* 1단계+: 정찰 손수건 */}
        {stageIdx >= 1 && <path d="M28 76 L56 76 L42 90 Z" fill="#A93F35" />}
        {/* 2단계+: 기사 견장 */}
        {stageIdx >= 2 && <><circle cx="42" cy="86" r="5" fill="#E8B44C" stroke="#8E7434" strokeWidth="1.5" /><path d="M42 84 L43.5 88 L40.5 88 Z" fill="#FFF3D6" /></>}
        {/* 3단계: 수호 왕관 */}
        {stageIdx >= 3 && <path d="M28 34 L33 25 L38 32 L42 23 L46 32 L51 25 L56 34 Z" fill="#E8B44C" stroke="#8E7434" strokeWidth="1.5" strokeLinejoin="round" />}
      </g>
    </svg>
  );
}

const DEFAULT_PROJECTS = [
  { id: "p1", name: "I-751 서류 제출", deadline: "2026-07-01", note: "서류 조립 완료 후 발송" },
  { id: "p2", name: "노션대학 7일 챌린지 배포", deadline: "2026-06-30", note: "워크북 최종 배포 (90%)" },
  { id: "p3", name: "구매대행 브랜드 론칭", deadline: "", note: "브랜드명 확정 + 기초 세팅 (20%)" },
];

/* ── 퀘스트 엔진 (게임 내장, 인터넷 불필요) ── */
const OUTBOUND_QUESTS = [
  { task: "노션대학 인스타에 다음 콘텐츠 1개 올리기", first: "인스타 앱을 열고 새 게시물을 누른다", venture: "노션대학" },
  { task: "블로그에 레스토랑 에피소드 1편 발행하기 (발행 버튼까지)", first: "블로그 앱을 열고 글쓰기를 누른다", venture: "블로그" },
  { task: "구매대행 잠재 고객 1명에게 의향 묻는 메시지 보내기", first: "인스타 DM을 열고 떠오르는 1명을 검색한다", venture: "구매대행" },
];
function forgeQuest(projects, history, blocked, time, energy) {
  const blockedText = blocked.map((b) => (b.task.venture || "") + " " + b.task.task).join(" ");
  const sorted = [...projects].sort((a, b) => {
    const da = dday(a.deadline), db = dday(b.deadline);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
  const candidates = sorted.filter((p) => p.deadline && !blockedText.includes(p.name));
  const last = history[history.length - 1];
  let target = candidates[0];
  // 직전에 같은 퀘스트를 했고, 7일 내 마감인 다른 퀘스트가 있으면 번갈아 진행
  if (target && last && last.venture === target.name && candidates[1] && dday(candidates[1].deadline) <= 7) {
    target = candidates[1];
  }
  if (target) {
    const d = ddayLabel(target.deadline);
    if (energy === "low" || time <= 10) {
      return { task: target.name + " — 가장 쉬운 조각 하나만 처리하기", why: "마감 " + d + ". 컨디션이 낮은 날엔 제일 만만한 조각으로 전선을 유지하는 게 승리야.", firstStep: "이 퀘스트의 앱이나 파일을 연다", venture: target.name, minutes: Math.min(time, 10) };
    }
    if (time >= 60 && energy === "high") {
      return { task: target.name + " — 완료에 가장 가까워지는 큰 덩어리 하나 끝내기", why: "마감 " + d + "! 쌩쌩할 때 보스급 조각을 잡아야 경험치가 커.", firstStep: "이 퀘스트의 앱이나 파일을 열고, 끝낼 덩어리 하나를 정한다", venture: target.name, minutes: Math.min(time, 90) };
    }
    return { task: target.name + " — 다음 한 걸음 전진시키기", why: "마감 " + d + ". 매일 한 걸음이면 마감 전에 도착해.", firstStep: "이 퀘스트의 앱이나 파일을 연다", venture: target.name, minutes: Math.min(time, 30) };
  }
  const q = OUTBOUND_QUESTS[history.length % OUTBOUND_QUESTS.length];
  return { task: q.task, why: "마감 퀘스트가 없을 땐, 세상 밖으로 뭔가 내보내는 게 최고의 경험치야.", firstStep: q.first, venture: q.venture, minutes: Math.min(time, 30) };
}

/* ── 약화 마법 (쪼개기 사다리) ── */
const WEAKEN_LADDER = [
  { suffix: " — 의 첫 10분만", why: "약화 마법 1단계. 10분 뒤에 도망쳐도 승리로 인정.", first: "전투 타이머의 시작을 누른다", min: 10 },
  { suffix: " — 딱 한 단위만 (한 문장/한 장/한 명)", why: "약화 마법 2단계. 적의 몸통은 두고 꼬리 하나만 끊자.", first: "그 '하나'가 뭔지 소리 내어 말한다", min: 5 },
  { suffix: " — 관련 앱·파일 열고 첫 줄만", why: "약화 마법 3단계. 문을 여는 것이 전투의 90%다.", first: "홈 화면에서 그 앱을 찾아 누른다", min: 3 },
  { suffix: " — 앱만 열기 (열면 승리)", why: "약화 마법 4단계. 오늘은 문만 열어도 영웅이야.", first: "그 앱 아이콘을 누른다", min: 1 },
  { suffix: " — 화면 켜기 (그게 전부)", why: "최종 약화. 이 적은 이제 슬라임이다. 못 이길 수 없어.", first: "화면을 켠다. 끝.", min: 1 },
];

const TIME_OPTIONS = [
  { label: "10분", sub: "짧은 사냥", value: 10 },
  { label: "30분", sub: "한 판", value: 30 },
  { label: "1시간", sub: "던전", value: 60 },
  { label: "2시간+", sub: "보스전", value: 120 },
];
const ENERGY_OPTIONS = [
  { label: "🪫", sub: "기력 바닥", value: "low" },
  { label: "🙂", sub: "보통", value: "mid" },
  { label: "🔥", sub: "풀파워", value: "high" },
];

const STORE_KEY = "hazel-rpg-v1";
const load = () => { try { const s = localStorage.getItem(STORE_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; } };
const save = (st) => { try { localStorage.setItem(STORE_KEY, JSON.stringify(st)); } catch (e) {} };

function Game() {
  const [screen, setScreen] = useState("title");
  const [state, setState] = useState(() => load() || { exp: 0, gold: 0, history: [], currentTask: null, shrinkCount: 0, projects: DEFAULT_PROJECTS, blocked: [] });
  const [time, setTime] = useState(null);
  const [energy, setEnergy] = useState(null);
  const [outputLine, setOutputLine] = useState("");
  const [blockReason, setBlockReason] = useState("");
  const [showBlockInput, setShowBlockInput] = useState(false);
  const [pName, setPName] = useState("");
  const [pDate, setPDate] = useState("");
  const [pNote, setPNote] = useState("");
  const [editId, setEditId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editDate, setEditDate] = useState("");
  const [editNote, setEditNote] = useState("");
  const [lastGain, setLastGain] = useState({ exp: 0, gold: 0, levelUp: false });
  const [elapsed, setElapsed] = useState(0);
  const [timerOn, setTimerOn] = useState(false);
  const tickRef = useRef(null);

  const persist = (next) => { setState(next); save(next); };

  useEffect(() => {
    if (timerOn) tickRef.current = setInterval(() => setElapsed((s) => s + 1), 1000);
    else if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; }
    return () => { if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; } };
  }, [timerOn]);
  const fmt = (s) => String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");

  /* 파생 스탯 */
  const { history, projects, blocked } = state;
  const { lv, rest, need } = levelFromExp(state.exp);
  const stageIdx = dogStageIdx(lv);
  const doneDates = [...new Set(history.map((h) => h.date))].sort();
  const doneToday = doneDates.includes(todayKey());
  let streak = 0;
  if (doneDates.length) {
    const gap = daysBetween(doneDates[doneDates.length - 1], todayKey());
    if (gap <= 1) {
      streak = 1;
      for (let i = doneDates.length - 1; i > 0; i--) {
        if (daysBetween(doneDates[i - 1], doneDates[i]) === 1) streak++; else break;
      }
    }
  }
  const sortedProjects = [...projects].sort((a, b) => {
    const da = dday(a.deadline), db = dday(b.deadline);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
  const urgent = sortedProjects.find((p) => p.deadline);

  /* 모험 시작 */
  const startQuest = () => {
    const q = forgeQuest(projects, history, blocked, time, energy);
    persist({ ...state, currentTask: q, shrinkCount: 0 });
    setElapsed(0); setTimerOn(false); setShowBlockInput(false); setBlockReason("");
    setScreen("battle");
  };

  /* 약화 마법 */
  const weaken = () => {
    const cur = state.currentTask; if (!cur) return;
    const count = state.shrinkCount || 0;
    const base = (cur.baseTask || cur.task).split(" — ")[0];
    const rung = WEAKEN_LADDER[Math.min(count, WEAKEN_LADDER.length - 1)];
    persist({ ...state, currentTask: { ...cur, baseTask: base, task: base + rung.suffix, why: rung.why, firstStep: rung.first, minutes: rung.min }, shrinkCount: count + 1 });
  };

  /* 승리 */
  const win = () => {
    if (!outputLine.trim()) return;
    setTimerOn(false);
    const cur = state.currentTask;
    const gainExp = Math.min(30, 10 + Math.round((cur.minutes || 10) / 5));
    const gainGold = 5 + Math.round((cur.minutes || 10) / 10);
    const before = levelFromExp(state.exp).lv;
    const after = levelFromExp(state.exp + gainExp).lv;
    const entry = { date: todayKey(), task: cur.task, venture: cur.venture, output: outputLine.trim(), spent: elapsed > 0 ? Math.round(elapsed / 60) : null };
    setLastGain({ exp: gainExp, gold: gainGold, levelUp: after > before });
    persist({ ...state, exp: state.exp + gainExp, gold: state.gold + gainGold, history: [...history, entry], currentTask: null, shrinkCount: 0 });
    setOutputLine("");
    setScreen("victory");
  };

  /* 봉인 (잠시 멈춤) */
  const sealQuest = () => {
    if (!blockReason.trim()) return;
    setTimerOn(false);
    const entry = { id: "b" + Date.now(), task: state.currentTask, reason: blockReason.trim(), date: todayKey() };
    persist({ ...state, blocked: [...blocked, entry], currentTask: null, shrinkCount: 0 });
    setBlockReason(""); setShowBlockInput(false); setTime(null); setEnergy(null);
    setScreen("camp");
  };
  const unseal = (id, resume) => {
    const item = blocked.find((b) => b.id === id);
    const restB = blocked.filter((b) => b.id !== id);
    if (resume && item) {
      persist({ ...state, blocked: restB, currentTask: { ...item.task, why: "봉인이 풀렸다! 식기 전에 바로 잡자." }, shrinkCount: 0 });
      setElapsed(0); setTimerOn(false);
      setScreen("battle");
    } else {
      persist({ ...state, blocked: restB });
    }
  };

  const retreat = () => {
    setTimerOn(false);
    persist({ ...state, currentTask: null, shrinkCount: 0 });
    setTime(null); setEnergy(null); setShowBlockInput(false); setBlockReason("");
    setScreen("camp");
  };

  /* 퀘스트(프로젝트) 관리 — 추가/편집/삭제 전부 가능 */
  const addProject = () => {
    if (!pName.trim()) return;
    persist({ ...state, projects: [...projects, { id: "p" + Date.now(), name: pName.trim(), deadline: pDate || "", note: pNote.trim() }] });
    setPName(""); setPDate(""); setPNote("");
  };
  const removeProject = (id) => {
    persist({ ...state, projects: projects.filter((p) => p.id !== id) });
    if (editId === id) setEditId(null);
  };
  const startEdit = (p) => { setEditId(p.id); setEditName(p.name); setEditDate(p.deadline || ""); setEditNote(p.note || ""); };
  const saveEdit = () => {
    if (!editName.trim()) return;
    persist({ ...state, projects: projects.map((p) => (p.id === editId ? { ...p, name: editName.trim(), deadline: editDate || "", note: editNote.trim() } : p)) });
    setEditId(null);
  };

  const ddClass = (dl) => { const n = dday(dl); if (n === null) return "free"; if (n <= 7) return "hot"; if (n <= 21) return "warm"; return "free"; };

  /* ── 공용 UI 조각 ── */
  const Hud = () => (
    <div className="hud frame">
      <div className="hud-row">
        <div className="hud-hero">
          <div className="hud-name">하젤 <span className="hud-lv">Lv.{lv}</span></div>
          <div className="hud-title">{heroTitle(lv)}</div>
        </div>
        <div className="hud-gold">🪙 {state.gold}</div>
      </div>
      <div className="bar"><div className="bar-fill exp" style={{ width: Math.round((rest / need) * 100) + "%" }} /></div>
      <div className="bar-txt">EXP {rest} / {need} · 🔥연속 {streak}일 · ⚔️승리 {history.length}회</div>
    </div>
  );

  /* ═══════════ 화면 ═══════════ */

  if (screen === "title") {
    return (
      <div className="rpg">
        <div className="stars" aria-hidden="true"></div>
        <div className="wrap title-wrap">
          <div className="title-eyebrow">QUANTUM QUEST</div>
          <h1 className="game-title">하젤 키우기</h1>
          <div className="title-sub">현실에서 한 일이 경험치가 되는 RPG</div>
          <div className="title-dog"><Danchu stageIdx={stageIdx} size={130} happy /></div>
          <button className="btn-main" onClick={() => setScreen("camp")}>{history.length > 0 ? "모험 이어하기" : "모험 시작"}</button>
          <div className="title-foot">아무것도 하지 않으면 아무것도 이뤄지지 않는다</div>
        </div>
      </div>
    );
  }

  if (screen === "camp") {
    return (
      <div className="rpg">
        <div className="stars" aria-hidden="true"></div>
        <div className="wrap">
          <div className="screen-label">🏕 베이스 캠프</div>
          <Hud />
          <div className="frame dogcard">
            <Danchu stageIdx={stageIdx} size={84} />
            <div className="dogcard-info">
              <div className="dogcard-name">동료 · 단추</div>
              <div className="dogcard-stage">{DOG_STAGES[stageIdx].title}{stageIdx < 3 ? " · Lv." + DOG_STAGES[stageIdx + 1].at + "에 진화" : " · 최종 진화!"}</div>
            </div>
          </div>
          {urgent && (
            <button className="frame urgent" onClick={() => setScreen("board")}>
              <span className="urgent-label">긴급 의뢰</span>
              <span className="urgent-name">{urgent.name}</span>
              <span className={"dd " + ddClass(urgent.deadline)}>{ddayLabel(urgent.deadline)}</span>
            </button>
          )}
          {blocked.length > 0 && (
            <div className="sealed-list">
              <div className="sec-label">🔒 봉인된 퀘스트</div>
              {blocked.map((b) => (
                <div className="frame sealed" key={b.id}>
                  <div className="sealed-task">{b.task.task}</div>
                  <div className="sealed-reason">봉인 사유: {b.reason}</div>
                  <div className="sealed-acts">
                    <button className="btn-sub green" onClick={() => unseal(b.id, true)}>봉인 해제 → 출전</button>
                    <button className="btn-sub" onClick={() => unseal(b.id, false)}>버리기</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <button className="btn-main" onClick={() => setScreen("prepare")}>⚔️ {doneToday ? "한 번 더 출전" : "오늘의 모험 떠나기"}</button>
          <button className="btn-board" onClick={() => setScreen("board")}>📜 퀘스트 보드 (목표 {projects.length}개 관리)</button>
          {history.length > 0 && (
            <div className="journal">
              <div className="sec-label">📖 모험 일지</div>
              {history.slice(-6).reverse().map((h, i) => (
                <div className="journal-item" key={i}>
                  <span className="journal-date">{h.date.slice(5).replace("-", "/")}</span>
                  <span className="journal-text">{h.output}</span>
                  {h.spent ? <span className="journal-spent">{h.spent}분</span> : null}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  if (screen === "board") {
    return (
      <div className="rpg">
        <div className="stars" aria-hidden="true"></div>
        <div className="wrap">
          <div className="screen-label">📜 퀘스트 보드</div>
          <div className="board-hint">모험은 마감이 급한 의뢰부터 나와. ✎로 이름·마감일·메모를 고칠 수 있어.</div>
          {sortedProjects.map((p) => (
            <div className="scroll" key={p.id}>
              <div className="scroll-row">
                <div className="scroll-main">
                  <div className="scroll-name">{p.name}</div>
                  {p.note ? <div className="scroll-note">{p.note}</div> : null}
                </div>
                <span className={"dd " + ddClass(p.deadline)}>{ddayLabel(p.deadline)}</span>
                <button className="ico" onClick={() => (editId === p.id ? setEditId(null) : startEdit(p))} aria-label="편집">✎</button>
                <button className="ico" onClick={() => removeProject(p.id)} aria-label="삭제">✕</button>
              </div>
              {editId === p.id && (
                <div className="editbox">
                  <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} placeholder="의뢰 이름" />
                  <input type="text" value={editNote} onChange={(e) => setEditNote(e.target.value)} placeholder="메모 (선택)" />
                  <div className="edit-row">
                    <input type="date" value={editDate} onChange={(e) => setEditDate(e.target.value)} />
                    <button className="btn-sub gold" onClick={saveEdit}>저장</button>
                    <button className="btn-sub" onClick={() => setEditId(null)}>취소</button>
                  </div>
                  <div className="board-hint small">날짜를 비우면 "자유" 의뢰가 돼</div>
                </div>
              )}
            </div>
          ))}
          <div className="scroll new">
            <div className="sec-label">새 의뢰 붙이기</div>
            <input type="text" placeholder="의뢰 이름 (예: 구매대행 인스타 개설)" value={pName} onChange={(e) => setPName(e.target.value)} />
            <input type="text" placeholder="메모 (선택)" value={pNote} onChange={(e) => setPNote(e.target.value)} />
            <div className="edit-row">
              <input type="date" value={pDate} onChange={(e) => setPDate(e.target.value)} />
              <button className="btn-sub gold" disabled={!pName.trim()} onClick={addProject}>붙이기</button>
            </div>
          </div>
          <button className="btn-board" onClick={() => setScreen("camp")}>← 캠프로 돌아가기</button>
        </div>
      </div>
    );
  }

  if (screen === "prepare") {
    return (
      <div className="rpg">
        <div className="stars" aria-hidden="true"></div>
        <div className="wrap">
          <div className="screen-label">⚔️ 출전 준비</div>
          <div className="sec-label">남은 시간</div>
          <div className="opt-grid">
            {TIME_OPTIONS.map((o) => (
              <button key={o.value} className={"opt" + (time === o.value ? " on" : "")} onClick={() => setTime(o.value)}>
                <b>{o.label}</b><i>{o.sub}</i>
              </button>
            ))}
          </div>
          <div className="sec-label">기력</div>
          <div className="opt-grid three">
            {ENERGY_OPTIONS.map((o) => (
              <button key={o.value} className={"opt" + (energy === o.value ? " on" : "")} onClick={() => setEnergy(o.value)}>
                <b>{o.label}</b><i>{o.sub}</i>
              </button>
            ))}
          </div>
          <button className="btn-main" disabled={!time || !energy} onClick={startQuest}>퀘스트 발동!</button>
          <button className="btn-board" onClick={() => setScreen("camp")}>← 캠프로</button>
        </div>
      </div>
    );
  }

  if (screen === "battle" && state.currentTask) {
    const t = state.currentTask;
    return (
      <div className="rpg">
        <div className="stars" aria-hidden="true"></div>
        <div className="wrap">
          <div className="screen-label">⚔️ 전투 중</div>
          <div className="enemy frame">
            <div className="enemy-tag">{t.venture}{state.shrinkCount > 0 ? " · 약화 ×" + state.shrinkCount : ""}</div>
            <div className="enemy-name">{t.task}</div>
            <div className="enemy-why">{t.why}</div>
            <div className="first-strike"><b>선제 공격 (30초)</b>{t.firstStep}</div>
            <div className="enemy-meta">예상 전투 시간 {t.minutes}분</div>
          </div>
          <div className="timer frame">
            <span className="timer-t">{fmt(elapsed)}</span>
            <span className="timer-lbl">{timerOn ? "전투 진행 중! 단추가 옆에서 짖는 중" : "시작을 누르면 전투 시간이 흘러 (선택)"}</span>
            <button className={"btn-sub " + (timerOn ? "" : "green")} onClick={() => setTimerOn(!timerOn)}>{timerOn ? "정지" : "시작"}</button>
          </div>
          <div className="sec-label">전리품 보고 — 뭘 해치웠는지 한 줄</div>
          <textarea value={outputLine} onChange={(e) => setOutputLine(e.target.value)} placeholder="예: 서류 조립 끝! / 티저 1장 올림" />
          <div className="battle-acts">
            <button className="btn-main slim" disabled={!outputLine.trim()} onClick={win}>승리 선언!</button>
            <button className="btn-weaken" onClick={weaken}>🪄 약화 마법<br /><span>적을 더 약하게</span></button>
          </div>
          {!showBlockInput ? (
            <button className="btn-board" onClick={() => setShowBlockInput(true)}>🔒 지금은 못 싸워 — 사유 적고 봉인하기</button>
          ) : (
            <div className="sealbox">
              <input type="text" value={blockReason} onChange={(e) => setBlockReason(e.target.value)} placeholder="예: 프린터가 없어서 / 답장 대기 중" />
              <div className="edit-row">
                <button className="btn-sub gold" disabled={!blockReason.trim()} onClick={sealQuest}>봉인하기</button>
                <button className="btn-sub" onClick={() => { setShowBlockInput(false); setBlockReason(""); }}>취소</button>
              </div>
            </div>
          )}
          <button className="btn-board" onClick={retreat}>🏳 후퇴 (캠프로)</button>
        </div>
      </div>
    );
  }

  if (screen === "victory") {
    return (
      <div className="rpg">
        <div className="stars" aria-hidden="true"></div>
        <div className="wrap victory-wrap">
          <div className={"victory-burst" + (lastGain.levelUp ? " big" : "")}>{lastGain.levelUp ? "LEVEL UP!" : "VICTORY!"}</div>
          <div className="victory-dog"><Danchu stageIdx={stageIdx} size={110} happy /></div>
          {lastGain.levelUp ? (
            <div className="victory-levelup">하젤 Lv.{lv} — {heroTitle(lv)} 달성! 단추도 으쓱한다</div>
          ) : (
            <div className="victory-msg">단추가 꼬리를 흔들며 전리품을 물어왔다</div>
          )}
          <div className="gain-row">
            <div className="gain frame"><b>+{lastGain.exp}</b><i>EXP</i></div>
            <div className="gain frame"><b>+{lastGain.gold}</b><i>골드</i></div>
          </div>
          <div className="bar wide"><div className="bar-fill exp" style={{ width: Math.round((rest / need) * 100) + "%" }} /></div>
          <div className="bar-txt">EXP {rest} / {need} · 다음 레벨까지 {need - rest}</div>
          <button className="btn-main" onClick={() => { setTime(null); setEnergy(null); setScreen("camp"); }}>캠프로 귀환</button>
        </div>
      </div>
    );
  }

  return (
    <div className="rpg"><div className="wrap"><button className="btn-main" onClick={() => setScreen("camp")}>캠프로</button></div></div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Game />);

</script>
</body>
</html>
