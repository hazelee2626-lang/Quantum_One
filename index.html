<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#5BA3D9"/>
<title>하젤마을 타이쿤</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --sky1:#5BA3D9;--sky2:#89C4E8;--sky3:#C6E8F5;
  --hill:#5FAD3E;--grass:#7CC454;--grass2:#93D468;
  --soil:#B4824A;--soil2:#C99660;
  --panel:#FBF2DC;--panel2:#F0E2BC;--panel3:#E8D5A0;
  --wood:#7C4D1E;--wood2:#5A3410;--wood3:#9E6B38;
  --gold:#F0A800;--gold2:#FFD040;--gold3:#C07800;
  --red:#CC3322;--red2:#E84433;
  --green:#3D8C30;--green2:#58B244;
  --blue:#2266CC;--blue2:#4488EE;
  --purple:#6644BB;--purple2:#8866DD;
  --ink:#3A2810;--ink2:#6B4A28;--ink3:#9A7A50;
  --white:#FFFDF5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Gowun Dodum','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  font-size:14px;color:var(--ink);word-break:keep-all;
  background:
    linear-gradient(180deg,
      var(--sky1) 0%,var(--sky2) 22%,var(--sky3) 42%,
      #DDEEBB 58%,var(--grass) 68%,var(--grass2) 78%,
      #6DB048 88%,#5A9A38 100%
    ) fixed center/cover;
  min-height:100vh;
}

/* ── 전체 레이아웃 ── */
.tycoon{min-height:100vh;display:flex;justify-content:center;
  padding:max(16px,env(safe-area-inset-top)) 14px 56px}
.wrap{width:100%;max-width:420px;position:relative;z-index:1}

/* ── 구름 ── */
.clouds{position:fixed;inset:0;pointer-events:none;
  background-image:
    radial-gradient(56px 22px at 15% 8%,#FFFf 60%,transparent 61%),
    radial-gradient(36px 16px at 23% 5.5%,#FFFf 60%,transparent 61%),
    radial-gradient(70px 26px at 68% 13%,#FFFf 60%,transparent 61%),
    radial-gradient(44px 18px at 78% 10%,#FFFf 60%,transparent 61%),
    radial-gradient(48px 20px at 44% 18%,rgba(255,255,255,.8) 60%,transparent 61%);
  animation:drift 50s linear infinite}
@keyframes drift{from{background-position:0 0}to{background-position:420px 0}}
@media(prefers-reduced-motion:reduce){
  .clouds,.hz-idle,.hz-bounce,.crane-load,.spark,.particles span{animation:none!important}}

/* ── 패널 (나무 판자) ── */
.panel{
  background:linear-gradient(180deg,var(--panel),var(--panel2) 60%,var(--panel3));
  border:3px solid var(--wood);border-radius:16px;
  box-shadow:0 5px 0 var(--wood2),0 10px 24px rgba(58,40,16,.22),
             inset 0 2px 0 rgba(255,255,255,.7);
  position:relative}
.panel::before,.panel::after{
  content:"";position:absolute;width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,var(--wood3),var(--wood2));
  box-shadow:inset 0 1px 2px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.3)}
.panel::before{top:8px;left:8px}
.panel::after{top:8px;right:8px}

/* ── 라벨 ── */
.screen-lbl{font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  color:var(--wood2);font-size:15px;text-align:center;
  letter-spacing:.12em;margin-bottom:14px;
  text-shadow:0 1px 0 rgba(255,255,255,.8)}
.sec-lbl{font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  color:var(--wood2);font-size:14px;margin:18px 0 9px}

/* ── 자원 바 ── */
.resbar{
  background:linear-gradient(180deg,var(--wood) 0%,var(--wood2));
  border:3px solid var(--wood2);border-radius:14px;
  box-shadow:0 4px 0 #2E1A06,0 8px 16px rgba(0,0,0,.25);
  display:flex;gap:4px;padding:10px 14px;margin-bottom:13px;
  align-items:center;flex-wrap:wrap}
.res-token{
  display:flex;align-items:center;gap:5px;flex:1;min-width:0;
  background:rgba(0,0,0,.28);border:1.5px solid rgba(255,255,255,.15);
  border-radius:10px;padding:7px 10px}
.res-token .ico{font-size:18px;line-height:1}
.res-token .amt{font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:19px;color:#FFE99A;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.res-token .lbl{font-size:9.5px;color:rgba(255,229,154,.65);line-height:1}
.streak-token{
  background:rgba(204,51,34,.35);border:1.5px solid rgba(255,120,80,.4);
  border-radius:10px;padding:6px 10px;
  font-family:'Jua',sans-serif;font-size:15px;color:#FFB59A;
  text-shadow:0 1px 2px rgba(0,0,0,.4)}

/* ── 마을 헤더 ── */
.vhead{text-align:center;margin-bottom:12px}
.vname{font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:28px;color:var(--white);
  text-shadow:0 2px 0 var(--wood2),0 4px 8px rgba(0,0,0,.3)}
.vtitle{font-size:14px;color:var(--gold2)}
.vsub{font-size:11.5px;color:rgba(255,255,255,.8);margin-top:3px;
  text-shadow:0 1px 2px rgba(0,0,0,.4)}

/* ── 들판 ── */
.field{
  background:linear-gradient(180deg,var(--grass2),var(--grass) 60%,#5A9A38);
  border:3px solid var(--wood2);border-radius:16px;
  box-shadow:0 5px 0 var(--wood2),inset 0 2px 0 rgba(255,255,255,.3),
             0 10px 24px rgba(0,0,0,.25);
  padding:14px 12px 22px;margin-bottom:12px;position:relative}
.plots{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.plot{
  border-radius:12px;cursor:pointer;
  padding:6px 6px 8px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(255,255,255,.22);
  border:2.5px solid rgba(90,52,16,.5);
  box-shadow:0 3px 0 rgba(58,40,16,.4),inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .08s}
.plot:active{transform:scale(.95)}
.plot.complete{
  background:rgba(255,253,240,.75);
  border-color:var(--gold);
  box-shadow:0 3px 0 var(--gold3),0 0 20px rgba(240,168,0,.5),
             inset 0 1px 0 rgba(255,255,255,.9)}
.plot.sel{outline:3px solid #FFF;outline-offset:2px}
.plot-name{
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:10.5px;color:var(--ink);text-align:center;line-height:1.3;
  text-shadow:0 1px 0 rgba(255,255,255,.7)}
.field-hero{position:absolute;right:6px;bottom:-18px;pointer-events:none;
  filter:drop-shadow(0 4px 4px rgba(58,40,16,.35))}

/* ── 건물 상세 ── */
.detail{padding:14px 16px;margin-bottom:12px}
.detail-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.detail-info .d-name{
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:18px;color:var(--ink)}
.detail-info .d-desc{font-size:12px;color:var(--ink2);margin-top:2px}
.detail-info .d-stage{
  font-family:'Jua',sans-serif;font-size:11px;
  color:var(--wood3);margin-top:4px}
.build-need{text-align:center;font-size:11.5px;color:var(--red);margin-top:8px}
.build-done{text-align:center;font-family:'Jua',sans-serif;
  color:var(--gold3);font-size:15px;padding:4px 0}

/* ── 건설 완료 메시지 ── */
.buildmsg{
  text-align:center;font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  color:var(--green);font-size:16px;
  margin:-4px 0 11px;
  animation:pop .4s cubic-bezier(.2,1.6,.4,1) both}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

/* ── 번뜩 할 일 ── */
.flash-btn{
  display:block;width:100%;padding:14px;margin-bottom:12px;
  border-radius:13px;cursor:pointer;
  background:linear-gradient(180deg,var(--gold2),var(--gold) 55%,#D09000);
  border:2.5px solid var(--gold3);
  color:var(--ink);font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:16px;
  box-shadow:0 4px 0 var(--gold3),0 8px 16px rgba(200,130,0,.25)}
.flash-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold3)}
.flashbox{padding:14px 16px;margin-bottom:12px;display:flex;flex-direction:column;gap:9px}
select{
  width:100%;padding:11px 12px;border-radius:10px;font-size:13.5px;
  font-family:'Gowun Dodum','Apple SD Gothic Neo',sans-serif;
  background:var(--white);border:2px solid var(--wood);color:var(--ink);
  -webkit-appearance:none;appearance:none;outline:none}
select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,168,0,.2)}

/* ── 납기 임박 / 중단 ── */
.urgent{
  display:flex;align-items:center;gap:9px;width:100%;padding:12px 20px;
  margin-bottom:11px;cursor:pointer;
  font-family:inherit;font-size:13.5px;color:var(--ink);text-align:left}
.urg-lbl{
  font-family:'Jua',sans-serif;font-size:12px;
  color:var(--red2);white-space:nowrap}
.urg-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hold-card{padding:13px 16px;margin-bottom:11px}
.hold-task{font-size:13px;line-height:1.55}
.hold-reason{font-size:11.5px;color:var(--red);margin-top:4px}
.hold-acts{display:flex;gap:8px;margin-top:10px}

/* ── DD 배지 ── */
.dd{
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:12px;padding:4px 11px;border-radius:99px;
  white-space:nowrap;border:2px solid;font-weight:400}
.hot{color:#9E2010;border-color:#CC9088;background:rgba(204,51,34,.14)}
.warm{color:#8A5500;border-color:#CCB070;background:rgba(240,168,0,.16)}
.free{color:#2A6A1A;border-color:#88BB66;background:rgba(88,178,68,.14)}

/* ── 버튼 ── */
.btn-main{
  display:block;width:100%;padding:18px;
  border:3px solid var(--wood2);border-radius:14px;cursor:pointer;
  background:linear-gradient(180deg,var(--gold2) 0%,var(--gold) 45%,#C88000);
  color:var(--ink);
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:21px;
  box-shadow:0 5px 0 var(--wood2),0 12px 28px rgba(200,128,0,.3);
  transition:transform .08s,box-shadow .08s;margin-top:13px}
.btn-main:active{transform:translateY(4px);box-shadow:0 1px 0 var(--wood2)}
.btn-main:disabled{opacity:.38}
.btn-main.sm{font-size:17px;padding:15px;flex:1.6;margin-top:0}
.btn-flat{
  display:block;width:100%;padding:12px;margin-top:10px;border-radius:12px;
  cursor:pointer;background:rgba(255,253,245,.5);
  border:2px dashed var(--wood3);color:var(--ink2);
  font-size:13px;font-family:inherit}
.btn-green{
  display:block;width:100%;padding:15px;margin-top:10px;border-radius:13px;
  cursor:pointer;
  background:linear-gradient(180deg,#7BD860,var(--green2) 50%,#2E7A22);
  border:2.5px solid var(--green);color:#1A4A10;
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:17px;
  box-shadow:0 4px 0 var(--green),0 10px 20px rgba(45,120,35,.25)}
.btn-green:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green)}
.btn-blue{
  display:block;width:100%;padding:13px;margin-top:10px;border-radius:13px;
  cursor:pointer;
  background:linear-gradient(180deg,#88AAEE,var(--blue2) 50%,#1A4FAA);
  border:2.5px solid var(--blue);color:#EEF4FF;
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:15px;
  box-shadow:0 4px 0 var(--blue),0 8px 18px rgba(30,80,180,.25)}
.btn-blue:active{transform:translateY(3px);box-shadow:0 1px 0 var(--blue)}
.btn-sub{
  padding:10px 14px;border-radius:10px;cursor:pointer;
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:14px;
  border:2px solid var(--wood);background:var(--panel);color:var(--ink2);
  box-shadow:0 3px 0 var(--wood2)}
.btn-sub:active{transform:translateY(2px);box-shadow:0 1px 0 var(--wood2)}
.btn-sub.gold{
  border-color:var(--gold3);
  background:linear-gradient(180deg,var(--gold2),var(--gold));color:var(--ink);
  box-shadow:0 3px 0 var(--gold3)}
.btn-sub.g{
  border-color:var(--green);
  background:linear-gradient(180deg,#7BD860,var(--green2));color:#1A3A10;
  box-shadow:0 3px 0 var(--green)}
.btn-sub:disabled{opacity:.38}
.btn-split{
  flex:1;padding:12px 8px;border-radius:12px;cursor:pointer;
  background:linear-gradient(180deg,#B8A8EE,var(--purple2) 55%,#4422AA);
  border:2.5px solid var(--purple);color:#EEE8FF;
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:14px;line-height:1.3;
  box-shadow:0 4px 0 var(--purple)}
.btn-split:active{transform:translateY(3px);box-shadow:0 1px 0 var(--purple)}
.btn-split span{font-family:'Gowun Dodum',sans-serif;font-size:10px;color:#CCB8FF}
.btn-build{
  width:100%;padding:14px;border-radius:12px;cursor:pointer;
  background:linear-gradient(180deg,#8EDA70,var(--green2) 55%,#226A16);
  border:2.5px solid var(--green);color:#102808;
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:17px;
  box-shadow:0 4px 0 var(--green),0 8px 16px rgba(40,120,30,.25)}
.btn-build:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green)}
.btn-build.no{opacity:.4}

/* ── 의뢰 게시판 ── */
.board-hint{font-size:12px;color:var(--ink2);text-align:center;
  line-height:1.7;margin-bottom:14px}
.board-hint.sm{text-align:left;margin:6px 0 0}
.order{padding:14px 16px;margin-bottom:12px}
.order-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.o-main{flex:1;min-width:0}
.o-name{font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:14.5px;color:var(--ink);line-height:1.4}
.o-note{font-size:11.5px;color:var(--ink2);margin-top:2px}
.ico{
  width:32px;height:32px;flex-shrink:0;border-radius:8px;cursor:pointer;
  border:2px solid var(--wood3);background:rgba(255,253,245,.7);
  color:var(--ink2);font-size:13px}
.ico:active{transform:scale(.93)}
.editbox{margin-top:11px;padding-top:11px;border-top:2px dashed var(--wood3);
  display:flex;flex-direction:column;gap:8px}
.edit-row{display:flex;gap:8px}
.edit-row input[type=date]{flex:1;min-width:0}

/* ── 할 일 ── */
.todos{margin-top:11px;padding-top:10px;border-top:2px dashed var(--wood3)}
.todo{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:13px}
.todo.done .todo-text{text-decoration:line-through;color:var(--ink3)}
.todo-ck{border:none;background:none;cursor:pointer;font-size:17px;
  color:var(--ink);padding:0;line-height:1}
.todo-text{flex:1;min-width:0;line-height:1.5}
.todo-del{border:none;background:none;cursor:pointer;
  color:var(--ink3);font-size:12px;padding:2px 5px}
.todo-add{display:flex;gap:7px;margin-top:8px}
.todo-add input{flex:1;min-width:0}
.todo-add .btn-sub{padding:9px 13px;font-size:13px}

/* ── 입력 공통 ── */
input[type=text],input[type=date],textarea{
  width:100%;padding:12px 14px;border-radius:11px;font-size:14px;
  font-family:'Gowun Dodum','Apple SD Gothic Neo',sans-serif;
  background:var(--white);border:2px solid var(--wood3);color:var(--ink);outline:none}
textarea{min-height:72px;resize:vertical}
input:focus,textarea:focus{border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(240,168,0,.2)}
input::placeholder,textarea::placeholder{color:var(--ink3)}

/* ── 출전 준비 ── */
.opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.opt-grid.three{grid-template-columns:repeat(3,1fr)}
.opt{
  padding:14px 6px;text-align:center;cursor:pointer;border-radius:12px;
  background:var(--panel);border:2.5px solid var(--wood3);color:var(--ink);
  font-family:inherit;
  box-shadow:0 3px 0 var(--wood2),inset 0 1px 0 rgba(255,255,255,.7)}
.opt:active{transform:translateY(2px);box-shadow:0 1px 0 var(--wood2)}
.opt b{display:block;font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:19px;font-weight:400}
.opt i{font-style:normal;font-size:10.5px;color:var(--ink2)}
.opt.on{
  border-color:var(--gold);
  background:linear-gradient(180deg,#FFF7DC,#FFE88A);color:var(--ink);
  box-shadow:0 3px 0 var(--gold3),0 0 14px rgba(240,168,0,.3)}
.loot-preview{
  text-align:center;font-size:13px;color:var(--ink2);
  margin-top:12px;padding:10px;
  background:rgba(255,255,255,.5);border-radius:10px;
  border:1.5px dashed var(--wood3)}

/* ── 작업 현장 ── */
.site-card{padding:18px 16px 16px;margin-bottom:11px}
.site-tag{
  display:inline-block;
  font-family:'Jua',sans-serif;font-size:12px;color:var(--purple);
  border:2px solid var(--purple2);border-radius:99px;
  padding:3px 12px;background:rgba(100,68,200,.1);margin-top:4px}
.site-name{
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;
  font-size:22px;line-height:1.4;margin:10px 0 8px;color:var(--ink)}
.site-why{font-size:13.5px;line-height:1.75;color:var(--ink2);margin-bottom:12px}
.first-step{
  background:rgba(240,168,0,.12);
  border:2px dashed var(--gold3);border-radius:11px;
  padding:11px 13px;font-size:13px;line-height:1.65}
.first-step b{
  display:block;font-family:'Jua',sans-serif;
  color:#8A5500;font-size:12px;margin-bottom:3px;font-weight:400}
.site-meta{margin-top:10px;font-size:11.5px;color:var(--ink3)}
.timer-row{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  margin-bottom:12px}
.timer-t{
  font-family:'Jua',sans-serif;font-size:26px;color:var(--ink);
  letter-spacing:.05em;min-width:76px}
.timer-lbl{flex:1;min-width:0;font-size:11px;color:var(--ink2);line-height:1.5}
.work-acts{display:flex;gap:9px;margin-top:13px}
.holdbox{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.sep{
  text-align:center;font-size:11px;color:var(--ink3);
  margin:8px 0;display:flex;align-items:center;gap:8px}
.sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--wood3);opacity:.4}

/* ── 일지 ── */
.journal{margin-top:18px}
.j-item{
  display:flex;gap:8px;align-items:baseline;
  padding:9px 2px;border-bottom:2px dashed var(--panel3);font-size:13px}
.j-date{font-family:'Jua',sans-serif;color:var(--red2);
  font-size:12px;white-space:nowrap}
.j-text{flex:1;min-width:0;line-height:1.5;color:var(--ink)}
.j-min{color:var(--ink3);font-size:11px;white-space:nowrap}

/* ── 타이틀 ── */
.title-wrap{text-align:center;padding-top:6vh}
.t-eyebrow{letter-spacing:.4em;font-size:11px;color:rgba(255,255,255,.75);
  text-shadow:0 1px 3px rgba(0,0,0,.4)}
.game-title{
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:56px;line-height:1.1;
  color:#FFF;
  text-shadow:0 3px 0 var(--wood2),0 6px 0 rgba(90,52,16,.5),
              0 14px 28px rgba(0,0,0,.4);margin:8px 0 6px}
.t-sub{font-size:13.5px;color:rgba(255,255,255,.8);
  text-shadow:0 1px 3px rgba(0,0,0,.4)}
.t-hero{margin:20px 0 4px}
.t-foot{margin-top:22px;font-size:12px;color:rgba(255,255,255,.6);
  text-shadow:0 1px 2px rgba(0,0,0,.4)}

/* ── 정산 ── */
.payday-wrap{text-align:center;padding-top:8vh}
.payday-burst{
  font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-size:44px;
  color:var(--gold2);
  text-shadow:0 3px 0 var(--wood2),0 0 40px rgba(255,210,60,.6);
  animation:burst .55s cubic-bezier(.2,1.7,.4,1) both}
@keyframes burst{from{transform:scale(2.3);opacity:0}to{transform:scale(1);opacity:1}}
.payday-hero{margin:16px 0 4px}

const todayKey = () => {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
};
const daysBetween=(a,b)=>Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);
const dday=(dl)=>dl?daysBetween(todayKey(),dl):null;
const ddayLabel=(dl)=>{const n=dday(dl);if(n===null)return"자유";if(n===0)return"오늘!";return n>0?"D-"+n:Math.abs(n)+"일 지남";};

let actx=null;
function sfx(k){
  try{
    actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    const ns=k==="build"?[392,523,659]:k==="done"?[523,659,784]:[659];
    ns.forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.type="triangle";o.frequency.value=f;
      g.gain.setValueAtTime(0.1,actx.currentTime+i*.09);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*.09+.25);
      o.connect(g);g.connect(actx.destination);
      o.start(actx.currentTime+i*.09);o.stop(actx.currentTime+i*.09+.3);
    });
  }catch(e){}
}

/* ── 작업 엔진: skippedTodoIds 추가, 완료/최근 기록 중복 방지 ── */
function forgeJob(projects,history,blocked,time,energy,skippedIds=[]){
  const blockedText=blocked.map(b=>(b.task.venture||"")+" "+b.task.task).join(" ");
  const recentTasks=history.slice(-5).map(h=>h.task);
  const sorted=[...projects].sort((a,b)=>{
    const da=dday(a.deadline),db=dday(b.deadline);
    if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;
  });
  const usable=sorted.filter(p=>!blockedText.includes(p.name));
  const withDL=usable.filter(p=>p.deadline);
  const last=history[history.length-1];
  let target=withDL[0];
  if(target&&last&&last.venture===target.name&&withDL[1]&&dday(withDL[1].deadline)<=7)target=withDL[1];

  const pickTodo=proj=>{
    if(!proj||!proj.todos)return null;
    const blockedTasks=blocked.map(b=>b.task.task);
    return proj.todos.find(t=>
      !t.done&&
      !blockedTasks.includes(t.text)&&
      !skippedIds.includes(t.id)&&
      !recentTasks.some(r=>r===t.text) // 최근 완료 중복 제거
    )||null;
  };
  // 1순위: 네가 직접 적어둔 할 일
  let todoProj=target, todo=pickTodo(target);
  if(!todo){for(const p of usable){const t=pickTodo(p);if(t){todoProj=p;todo=t;break;}}}
  if(todo){
    const d=todoProj.deadline?"납기 "+ddayLabel(todoProj.deadline)+". ":"";
    return{task:todo.text,why:d+"네가 직접 적어둔 할 일이야. 떠올랐을 때 적어둔 너, 잘했다.",
      firstStep:"이 할 일에 필요한 앱이나 파일을 연다",venture:todoProj.name,
      minutes:Math.min(time,energy==="low"?15:30),ref:{pid:todoProj.id,tid:todo.id}};
  }
  if(target){
    const d=ddayLabel(target.deadline);
    if(energy==="low"||time<=10)
      return{task:target.name+" — 가장 쉬운 조각 하나만 처리하기",why:"납기 "+d+". 컨디션 낮은 날엔 만만한 자재 하나만 옮겨도 공사는 굴러가.",firstStep:"이 작업에 필요한 앱이나 파일을 연다",venture:target.name,minutes:Math.min(time,10)};
    if(time>=60&&energy==="high")
      return{task:target.name+" — 완료에 가장 가까워지는 큰 덩어리 하나 끝내기",why:"납기 "+d+"! 풀파워일 때 대형 자재를 옮겨야 보상이 커.",firstStep:"이 작업의 앱이나 파일을 열고, 끝낼 덩어리 하나를 정한다",venture:target.name,minutes:Math.min(time,90)};
    return{task:target.name+" — 다음 한 걸음 전진시키기",why:"납기 "+d+". 매일 한 걸음이면 납기 전에 준공돼.",firstStep:"이 작업의 앱이나 파일을 연다",venture:target.name,minutes:Math.min(time,30)};
  }
  const q=FREE_JOBS[history.length%FREE_JOBS.length];
  return{task:q.task,why:"납기 의뢰가 없을 땐, 세상 밖으로 내보내는 작업이 제일 비싼 자원을 줘.",firstStep:q.first,venture:q.venture,minutes:Math.min(time,30)};
}

  gold:(m>=60?1:0)+(streak>=3?1:0)
});

const SK="hazel-tycoon-v1";
const norm=st=>{if(!st)return null;
  st.projects=(st.projects||DEFAULT_PROJECTS).map(p=>({...p,todos:p.todos||[]}));
  st.blocked=st.blocked||[];st.res=st.res||{wood:0,brick:0,gold:0};
  st.built=st.built||[];st.history=st.history||[];return st;};
const loadS=()=>{try{const s=localStorage.getItem(SK);return norm(s?JSON.parse(s):null);}catch(e){return null;}};
const saveS=st=>{try{localStorage.setItem(SK,JSON.stringify(st));}catch(e){}};

function Game(){
  const[screen,setScreen]=useState("title");
  const[state,setState]=useState(()=>loadS()||{
    res:{wood:0,brick:0,gold:0},built:{},
    history:[],currentTask:null,shrinkCount:0,
    projects:DEFAULT_PROJECTS,blocked:[],
  });
  const[time,setTime]=useState(null);
  const[energy,setEnergy]=useState(null);
  const[outputLine,setOutputLine]=useState("");
  const[blockReason,setBlockReason]=useState("");
  const[showBlock,setShowBlock]=useState(false);
  const[pName,setPName]=useState("");
  const[pDate,setPDate]=useState("");
  const[pNote,setPNote]=useState("");
  const[editId,setEditId]=useState(null);
  const[editName,setEditName]=useState("");
  const[editDate,setEditDate]=useState("");
  const[editNote,setEditNote]=useState("");
  const[lastLoot,setLastLoot]=useState({wood:0,brick:0,gold:0});
  const[buildMsg,setBuildMsg]=useState("");
  const[selected,setSelected]=useState(null);
  const[flash,setFlash]=useState(false);
  const[flashText,setFlashText]=useState("");
  const[flashProj,setFlashProj]=useState("");
  const[todoText,setTodoText]=useState({});
  const[skipped,setSkipped]=useState([]); // 이번 세션 스킵된 todo id
  const[elapsed,setElapsed]=useState(0);
  const[timerOn,setTimerOn]=useState(false);
  const tick=useRef(null);

  const persist=next=>{setState(next);saveS(next);};

  useEffect(()=>{
    if(timerOn)tick.current=setInterval(()=>setElapsed(s=>s+1),1000);
    else if(tick.current){clearInterval(tick.current);tick.current=null;}
    return()=>{if(tick.current){clearInterval(tick.current);tick.current=null;}};
  },[timerOn]);
  const fmt=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");

  const{history,projects,blocked,res,built}=state;
  const stagePts=Object.values(built).reduce((a,b)=>a+b,0);
  const completedCount=BUILDINGS.filter(b=>(built[b.id]||0)>=3).length;
  const pop=stagePts*3+completedCount*5;
  const doneDates=[...new Set(history.map(h=>h.date))].sort();
  const doneToday=doneDates.includes(todayKey());
  let streak=0;
  if(doneDates.length){
    const gap=daysBetween(doneDates[doneDates.length-1],todayKey());
    if(gap<=1){streak=1;for(let i=doneDates.length-1;i>0;i--){if(daysBetween(doneDates[i-1],doneDates[i])===1)streak++;else break;}}
  }
  const sortedProjects=[...projects].sort((a,b)=>{
    const da=dday(a.deadline),db=dday(b.deadline);
    if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;
  });
  const urgent=sortedProjects.find(p=>p.deadline);
  const openTodos=projects.reduce((n,p)=>n+p.todos.filter(t=>!t.done).length,0);

  const startJob=()=>{
    const q=forgeJob(projects,history,blocked,time,energy,skipped);
    persist({...state,currentTask:q,shrinkCount:0});
    setElapsed(0);setTimerOn(false);setShowBlock(false);setBlockReason("");
    setScreen("work");
  };

  /* 이미 했어요 — 빠른 완료 (타이머 불필요, 기록 자동 생성) */
  const quickDone=()=>{
    setTimerOn(false);
    const cur=state.currentTask;
    const loot=calcLoot(cur.minutes||10,streak);
    const autoOut=(cur.ref?cur.task:cur.task.split(" — ")[0])+" ✓";
    const entry={date:todayKey(),task:cur.task,venture:cur.venture,output:autoOut,spent:null};
    let nextProjects=projects;
    if(cur.ref){
      nextProjects=projects.map(p=>p.id===cur.ref.pid
        ?{...p,todos:p.todos.map(t=>t.id===cur.ref.tid?{...t,done:true}:t)}:p);
    }
    setLastLoot(loot);sfx("done");
    persist({...state,projects:nextProjects,res:{wood:res.wood+loot.wood,brick:res.brick+loot.brick,gold:res.gold+loot.gold},history:[...history,entry],currentTask:null,shrinkCount:0});
    setOutputLine("");setScreen("payday");
  };

  /* 직접 입력 완료 */
  const finishJob=()=>{
    if(!outputLine.trim())return;
    setTimerOn(false);
    const cur=state.currentTask;
    const loot=calcLoot(cur.minutes||10,streak);
    const entry={date:todayKey(),task:cur.task,venture:cur.venture,output:outputLine.trim(),spent:elapsed>0?Math.round(elapsed/60):null};
    let nextProjects=projects;
    if(cur.ref){
      nextProjects=projects.map(p=>p.id===cur.ref.pid
        ?{...p,todos:p.todos.map(t=>t.id===cur.ref.tid?{...t,done:true}:t)}:p);
    }
    setLastLoot(loot);sfx("done");
    persist({...state,projects:nextProjects,res:{wood:res.wood+loot.wood,brick:res.brick+loot.brick,gold:res.gold+loot.gold},history:[...history,entry],currentTask:null,shrinkCount:0});
    setOutputLine("");setScreen("payday");
  };

  /* 다음 할일로 넘기기 */
  const skipTask=()=>{
    const cur=state.currentTask;
    const newSkipped=cur.ref?[...skipped,cur.ref.tid]:skipped;
    setSkipped(newSkipped);
    const q=forgeJob(projects,history,blocked,time,energy,newSkipped);
    persist({...state,currentTask:q,shrinkCount:0});
    setElapsed(0);setTimerOn(false);
  };

  const splitJob=()=>{
    const cur=state.currentTask;if(!cur)return;
    const count=state.shrinkCount||0;
    const base=(cur.baseTask||cur.task).split(" — ")[0];
    const rung=SPLIT_LADDER[Math.min(count,SPLIT_LADDER.length-1)];
    persist({...state,currentTask:{...cur,baseTask:base,task:base+rung.suffix,why:rung.why,firstStep:rung.first,minutes:rung.min},shrinkCount:count+1});
  };

  const holdJob=()=>{
    if(!blockReason.trim())return;
    setTimerOn(false);
    const entry={id:"b"+Date.now(),task:state.currentTask,reason:blockReason.trim(),date:todayKey()};
    persist({...state,blocked:[...blocked,entry],currentTask:null,shrinkCount:0});
    setBlockReason("");setShowBlock(false);setTime(null);setEnergy(null);
    setScreen("village");
  };
  const releaseHold=(id,resume)=>{
    const item=blocked.find(b=>b.id===id);
    const restB=blocked.filter(b=>b.id!==id);
    if(resume&&item){
      persist({...state,blocked:restB,currentTask:{...item.task,why:"자재가 입고됐다! 식기 전에 바로 잇자."},shrinkCount:0});
      setElapsed(0);setTimerOn(false);setScreen("work");
    }else{persist({...state,blocked:restB});}
  };
  const quitJob=()=>{
    setTimerOn(false);
    persist({...state,currentTask:null,shrinkCount:0});
    setTime(null);setEnergy(null);setShowBlock(false);setBlockReason("");
    setScreen("village");
  };

  const construct=b=>{
    const cur=built[b.id]||0;if(cur>=3)return;
    const cost=b.stages[cur];if(!canAfford(res,cost))return;
    const next=cur+1;sfx("build");
    persist({...state,res:{wood:res.wood-(cost.w||0),brick:res.brick-(cost.b||0),gold:res.gold-(cost.g||0)},built:{...built,[b.id]:next}});
    setBuildMsg(next>=3?"🎉 "+b.name+" 완공!":"🔨 "+b.name+" — "+STAGE_NAMES[next]);
    setTimeout(()=>setBuildMsg(""),2500);
  };

  const saveFlash=()=>{
    if(!flashText.trim())return;
    const pid=flashProj||(urgent?urgent.id:(projects[0]&&projects[0].id));
    if(!pid)return;
    persist({...state,projects:projects.map(p=>p.id===pid?{...p,todos:[...p.todos,{id:"t"+Date.now(),text:flashText.trim(),done:false}]}:p)});
    setFlashText("");setFlash(false);
    setBuildMsg("💡 할 일 접수! 다음 작업 뽑기에 1순위로 반영돼");
    setTimeout(()=>setBuildMsg(""),2400);
  };
  const addTodo=pid=>{
    const txt=(todoText[pid]||"").trim();if(!txt)return;
    persist({...state,projects:projects.map(p=>p.id===pid?{...p,todos:[...p.todos,{id:"t"+Date.now(),text:txt,done:false}]}:p)});
    setTodoText({...todoText,[pid]:""});
  };
  const toggleTodo=(pid,tid)=>{
    persist({...state,projects:projects.map(p=>p.id===pid?{...p,todos:p.todos.map(t=>t.id===tid?{...t,done:!t.done}:t)}:p)});
  };
  const removeTodo=(pid,tid)=>{
    persist({...state,projects:projects.map(p=>p.id===pid?{...p,todos:p.todos.filter(t=>t.id!==tid)}:p)});
  };
  const addProject=()=>{
    if(!pName.trim())return;
    persist({...state,projects:[...projects,{id:"p"+Date.now(),name:pName.trim(),deadline:pDate||"",note:pNote.trim(),todos:[]}]});
    setPName("");setPDate("");setPNote("");
  };
  const removeProject=id=>{persist({...state,projects:projects.filter(p=>p.id!==id)});if(editId===id)setEditId(null);};
  const startEdit=p=>{setEditId(p.id);setEditName(p.name);setEditDate(p.deadline||"");setEditNote(p.note||"");};
  const saveEdit=()=>{
    if(!editName.trim())return;
    persist({...state,projects:projects.map(p=>p.id===editId?{...p,name:editName.trim(),deadline:editDate||"",note:editNote.trim()}:p)});
    setEditId(null);
  };

  const ddC=dl=>{const n=dday(dl);if(n===null)return"free";if(n<=7)return"hot";if(n<=21)return"warm";return"free";};

  const FlashPanel=()=>flash?(
    <div className="panel flashbox">
      <div className="sec-lbl">💡 갑자기 떠오른 할 일</div>
      <input type="text" autoFocus value={flashText} onChange={e=>setFlashText(e.target.value)} placeholder="예: 워크북 표지 오타 고치기"/>
      <select value={flashProj||(urgent?urgent.id:"")} onChange={e=>setFlashProj(e.target.value)}>
        {sortedProjects.map(p=><option key={p.id} value={p.id}>{p.name} ({ddayLabel(p.deadline)})</option>)}
      </select>
      <div className="edit-row">
        <button className="btn-sub gold" disabled={!flashText.trim()} onClick={saveFlash}>적어두기</button>
        <button className="btn-sub" onClick={()=>{setFlash(false);setFlashText("");}}>취소</button>
      </div>
      <div className="board-hint sm">적어두면 작업 뽑기가 이걸 1순위로 골라줘.</div>
    </div>
  ):(
    <button className="flash-btn" onClick={()=>setFlash(true)}>
      💡 할 일이 번뜩 떠올랐어!{openTodos>0?" (대기 "+openTodos+"개)":""}
    </button>
  );

  const ResBar=()=>(
    <div className="resbar">
      <div className="res-token"><span className="ico">🪵</span><div><div className="amt">{res.wood}</div><div className="lbl">목재</div></div></div>
      <div className="res-token"><span className="ico">🧱</span><div><div className="amt">{res.brick}</div><div className="lbl">벽돌</div></div></div>
      <div className="res-token"><span className="ico">🪙</span><div><div className="amt">{res.gold}</div><div className="lbl">금</div></div></div>
      <div className="streak-token">🔥{streak}</div>
    </div>
  );

  if(screen==="title")return(
    <div className="tycoon"><div className="clouds"/>
    <div className="wrap title-wrap">
      <div className="t-eyebrow">HAZEL VILLAGE TYCOON</div>
      <h1 className="game-title">하젤마을<br/>타이쿤</h1>
      <div className="t-sub">현실의 작업으로 자원을 캐고, 마을을 짓는 게임</div>
      <div className="t-hero"><Hazel grown={stagePts} size={150} happy/></div>
      <button className="btn-main" onClick={()=>setScreen("village")}>{history.length>0?"마을로 돌아가기":"개척 시작"}</button>
      <div className="t-foot">아무것도 하지 않으면 아무것도 지어지지 않는다</div>
    </div></div>
  );

  if(screen==="village")return(
    <div className="tycoon"><div className="clouds"/>
    <div className="wrap">
      <div className="vhead">
        <div className="vname">하젤마을 <span className="vtitle">{villageTitle(stagePts)}</span></div>
        <div className="vsub">👥 {pop}명 · 완공 {completedCount}/6 · {hazelRank(stagePts)}</div>
      </div>
      <ResBar/>
      {buildMsg&&<div className="buildmsg">{buildMsg}</div>}
      <div className="field">
        <div className="plots">
          {BUILDINGS.map(b=>{
            const st=built[b.id]||0;const isSel=selected===b.id;
            return(
              <button key={b.id} className={"plot"+(isSel?" sel":"")+(st>=3?" complete":"")} onClick={()=>setSelected(isSel?null:b.id)}>
                <Building b={b} stage={st} size={92}/>
                <span className="plot-name">{st===0?"빈 터":b.name}{st>0&&st<3?" "+st+"/3":""}</span>
              </button>
            );
          })}
        </div>
        <div className="field-hero"><Hazel grown={stagePts} size={66}/></div>
      </div>
      {selected&&(()=>{
        const b=BUILDINGS.find(x=>x.id===selected);
        const st=built[b.id]||0;const cost=st<3?b.stages[st]:null;
        return(
          <div className="panel detail">
            <div className="detail-top">
              <Building b={b} stage={st} size={60}/>
              <div className="detail-info">
                <div className="d-name">{b.name}</div>
                <div className="d-desc">{b.desc}</div>
                <div className="d-stage">{STAGE_NAMES[st]}</div>
              </div>
            </div>
            {cost?<>
              <button className={"btn-build"+(canAfford(res,cost)?"":" no")} disabled={!canAfford(res,cost)} onClick={()=>construct(b)}>
                {st===0?"착공":st===1?"골조 올리기":"완공시키기"} — {costText(cost)}
              </button>
              {!canAfford(res,cost)&&<div className="build-need">자원이 부족해 — 작업 나가서 캐오자!</div>}
            </>:<div className="build-done">완공! 주민들이 모여든다 ✨</div>}
          </div>
        );
      })()}
      <FlashPanel/>
      {urgent&&<button className="panel urgent" onClick={()=>setScreen("board")}>
        <span className="urg-lbl">납기 임박</span>
        <span className="urg-name">{urgent.name}</span>
        <span className={"dd "+ddC(urgent.deadline)}>{ddayLabel(urgent.deadline)}</span>
      </button>}
      {blocked.map(b=>(
        <div className="panel hold-card" key={b.id}>
          <div className="hold-task">⏸ {b.task.task}</div>
          <div className="hold-reason">중단 사유: {b.reason}</div>
          <div className="hold-acts">
            <button className="btn-sub g" onClick={()=>releaseHold(b.id,true)}>재개 → 현장으로</button>
            <button className="btn-sub" onClick={()=>releaseHold(b.id,false)}>철거</button>
          </div>
        </div>
      ))}
      <button className="btn-main" onClick={()=>setScreen("prepare")}>⛏ {doneToday?"한 탕 더 나가기":"오늘의 작업 나가기"}</button>
      <button className="btn-flat" onClick={()=>setScreen("board")}>📋 의뢰 게시판 — 목표 {projects.length}개 · 할 일 {openTodos}개</button>
      {history.length>0&&<div className="journal">
        <div className="sec-lbl">📒 작업 일지</div>
        {history.slice(-6).reverse().map((h,i)=>(
          <div className="j-item" key={i}>
            <span className="j-date">{h.date.slice(5).replace("-","/")}</span>
            <span className="j-text">{h.output}</span>
            {h.spent?<span className="j-min">{h.spent}분</span>:null}
          </div>
        ))}
      </div>}
    </div></div>
  );

  if(screen==="board")return(
    <div className="tycoon"><div className="clouds"/>
    <div className="wrap">
      <div className="screen-lbl">📋 의뢰 게시판</div>
      <div className="board-hint">납기 급한 의뢰의 ☐ 할 일이 작업 1순위야. ✎로 의뢰를 수정하고, 떠오른 할 일은 바로 적어둬.</div>
      <FlashPanel/>
      {sortedProjects.map(p=>(
        <div className="panel order" key={p.id}>
          <div className="order-row">
            <div className="o-main">
              <div className="o-name">{p.name}</div>
              {p.note&&<div className="o-note">{p.note}</div>}
            </div>
            <span className={"dd "+ddC(p.deadline)}>{ddayLabel(p.deadline)}</span>
            <button className="ico" onClick={()=>editId===p.id?setEditId(null):startEdit(p)}>✎</button>
            <button className="ico" onClick={()=>removeProject(p.id)}>✕</button>
          </div>
          {editId===p.id&&<div className="editbox">
            <input type="text" value={editName} onChange={e=>setEditName(e.target.value)} placeholder="의뢰 이름"/>
            <input type="text" value={editNote} onChange={e=>setEditNote(e.target.value)} placeholder="메모 (선택)"/>
            <div className="edit-row">
              <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}/>
              <button className="btn-sub gold" onClick={saveEdit}>저장</button>
              <button className="btn-sub" onClick={()=>setEditId(null)}>취소</button>
            </div>
          </div>}
          <div className="todos">
            {p.todos.map(t=>(
              <div className={"todo"+(t.done?" done":"")} key={t.id}>
                <button className="todo-ck" onClick={()=>toggleTodo(p.id,t.id)}>{t.done?"☑":"☐"}</button>
                <span className="todo-text">{t.text}</span>
                <button className="todo-del" onClick={()=>removeTodo(p.id,t.id)}>✕</button>
              </div>
            ))}
            <div className="todo-add">
              <input type="text" value={todoText[p.id]||""} onChange={e=>setTodoText({...todoText,[p.id]:e.target.value})} placeholder="+ 이 의뢰에 할 일 적어두기"/>
              <button className="btn-sub gold" disabled={!(todoText[p.id]||"").trim()} onClick={()=>addTodo(p.id)}>추가</button>
            </div>
          </div>
        </div>
      ))}
      <div className="panel order">
        <div className="sec-lbl">새 의뢰 붙이기</div>
        <input type="text" placeholder="의뢰 이름" value={pName} onChange={e=>setPName(e.target.value)} style={{marginBottom:8}}/>
        <input type="text" placeholder="메모 (선택)" value={pNote} onChange={e=>setPNote(e.target.value)} style={{marginBottom:8}}/>
        <div className="edit-row">
          <input type="date" value={pDate} onChange={e=>setPDate(e.target.value)}/>
          <button className="btn-sub gold" disabled={!pName.trim()} onClick={addProject}>붙이기</button>
        </div>
      </div>
      <button className="btn-flat" onClick={()=>setScreen("village")}>← 마을로 돌아가기</button>
    </div></div>
  );

  if(screen==="prepare")return(
    <div className="tycoon"><div className="clouds"/>
    <div className="wrap">
      <div className="screen-lbl">⛏ 작업 준비</div>
      <div className="sec-lbl">쓸 수 있는 시간</div>
      <div className="opt-grid">
        {TIME_OPTIONS.map(o=>(
          <button key={o.value} className={"opt"+(time===o.value?" on":"")} onClick={()=>setTime(o.value)}>
            <b>{o.label}</b><i>{o.sub}</i>
          </button>
        ))}
      </div>
      <div className="sec-lbl">기력</div>
      <div className="opt-grid three">
        {ENERGY_OPTIONS.map(o=>(
          <button key={o.value} className={"opt"+(energy===o.value?" on":"")} onClick={()=>setEnergy(o.value)}>
            <b>{o.label}</b><i>{o.sub}</i>
          </button>
        ))}
      </div>
      <div className="loot-preview">예상 보상: 🪵 {time?3+Math.floor(time/10):"?"} {time>=20?"🧱 "+(1+Math.floor(time/30)):""} {time>=60?"🪙 1":""}{streak>=3?" (+연속 보너스 🪙1)":""}</div>
      <button className="btn-main" disabled={!time||!energy} onClick={startJob}>작업 의뢰 받기</button>
      <button className="btn-flat" onClick={()=>setScreen("village")}>← 마을로</button>
    </div></div>
  );

  if(screen==="work"&&state.currentTask){
    const t=state.currentTask;
    return(
      <div className="tycoon"><div className="clouds"/>
      <div className="wrap">
        <div className="screen-lbl">🔨 작업 현장</div>
        <div className="panel site-card">
          <div className="site-tag">{t.venture}{t.ref?" · 💡 네가 적어둔 할 일":""}{state.shrinkCount>0?" · 공정 분할 ×"+state.shrinkCount:""}</div>
          <div className="site-name">{t.task}</div>
          <div className="site-why">{t.why}</div>
          <div className="first-step"><b>첫 삽 (30초)</b>{t.firstStep}</div>
          <div className="site-meta">예상 {t.minutes}분 · 보상 🪵{3+Math.floor((t.minutes||10)/10)}{(t.minutes||0)>=20?" 🧱"+(1+Math.floor(t.minutes/30)):""}{(t.minutes||0)>=60?" 🪙1":""}</div>
        </div>
        <div className="panel timer-row">
          <span className="timer-t">{fmt(elapsed)}</span>
          <span className="timer-lbl">{timerOn?"작업 중! 하젤이 현장 순찰 중":"타이머 (선택사항이야, 안 눌러도 돼)"}</span>
          <button className={"btn-sub "+(timerOn?"":"g")} onClick={()=>setTimerOn(!timerOn)}>{timerOn?"정지":"시작"}</button>
        </div>
        <button className="btn-green" onClick={quickDone}>✓ 이미 했어요! — 바로 자원 받기</button>
        <button className="btn-blue" onClick={skipTask}>→ 다음 할 일로 넘기기</button>
        <div className="sep">또는 직접 기록하기</div>
        <textarea value={outputLine} onChange={e=>setOutputLine(e.target.value)} placeholder="뭘 끝냈는지 한 줄 (예: 서류 조립 끝!)"/>
        <div className="work-acts">
          <button className="btn-main sm" disabled={!outputLine.trim()} onClick={finishJob}>작업 완료! 정산</button>
          <button className="btn-split" onClick={splitJob}>⚒ 공정 분할<br/><span>더 작은 작업으로</span></button>
        </div>
        {!showBlock
          ?<button className="btn-flat" onClick={()=>setShowBlock(true)}>⏸ 지금은 못 해 — 사유 적고 공사 중단</button>
          :<div className="holdbox">
            <input type="text" value={blockReason} onChange={e=>setBlockReason(e.target.value)} placeholder="예: 프린터가 없어서 / 답장 대기 중"/>
            <div className="edit-row">
              <button className="btn-sub gold" disabled={!blockReason.trim()} onClick={holdJob}>중단해두기</button>
              <button className="btn-sub" onClick={()=>{setShowBlock(false);setBlockReason("");}}>취소</button>
            </div>
          </div>}
        <button className="btn-flat" onClick={quitJob}>퇴근 (마을로)</button>
      </div></div>
    );
  }

  if(screen==="payday")return(
    <div className="tycoon"><div className="clouds"/>
    <div className="particles"><span>🪵</span><span>🧱</span><span>🪙</span><span>🪵</span><span>✨</span><span>🪵</span></div>
    <div className="wrap payday-wrap">
      <div className="payday-burst">정산 완료!</div>
      <div className="payday-hero"><Hazel grown={stagePts} size={130} happy/></div>
      <div className="payday-msg">하젤이 수레 가득 자원을 싣고 돌아왔다</div>
      <div className="loot-row">
        <div className="loot panel"><b>+{lastLoot.wood}</b><i>🪵 목재</i></div>
        {lastLoot.brick>0&&<div className="loot panel"><b>+{lastLoot.brick}</b><i>🧱 벽돌</i></div>}
        {lastLoot.gold>0&&<div className="loot panel"><b>+{lastLoot.gold}</b><i>🪙 금</i></div>}
      </div>
      <div className="payday-total">보유: 🪵 {res.wood} · 🧱 {res.brick} · 🪙 {res.gold}</div>
      <button className="btn-main" onClick={()=>{setTime(null);setEnergy(null);setScreen("village");}}>마을로 — 건설하러 가기</button>
    </div></div>
  );

  return <div className="tycoon"><div className="wrap"><button className="btn-main" onClick={()=>setScreen("village")}>마을로</button></div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Game/>);
</script>
</body>
</html>
