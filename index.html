<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#BCE0EE" />
<title>하젤마을 타이쿤</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --sky: #BCE0EE; --sky2: #DDF0F6; --cream: #FBF4E2;
    --grass: #9CC47E; --grass2: #88B56A; --soil: #C9A77B;
    --wood: #8A6B4A; --wood2: #6E5238; --plank: #E8C896; --plank2: #D9B47C;
    --ink: #4A3B2A; --ink-soft: #7B6749;
    --gold: #D9A441; --hot: #C75146; --green: #5F8A4E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: linear-gradient(180deg, var(--sky) 0%, var(--sky2) 38%, var(--cream) 70%) fixed var(--cream);
    color: var(--ink);
    font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 14px; word-break: keep-all;
  }
  .tycoon { min-height: 100vh; position: relative; display: flex; justify-content: center;
            padding: max(20px, env(safe-area-inset-top)) 16px 60px; }
  .wrap { width: 100%; max-width: 430px; position: relative; z-index: 1; }

  /* 흘러가는 구름 */
  .clouds { position: fixed; inset: 0; pointer-events: none; opacity: .8;
    background-image:
      radial-gradient(42px 16px at 18% 7%, #FFFFFF 60%, transparent 61%),
      radial-gradient(30px 12px at 24% 5.4%, #FFFFFF 60%, transparent 61%),
      radial-gradient(54px 18px at 74% 12%, #FFFFFF 60%, transparent 61%),
      radial-gradient(34px 13px at 80% 10%, #FFFFFF 60%, transparent 61%),
      radial-gradient(38px 14px at 45% 17%, #FFFFFFCC 60%, transparent 61%);
    animation: drift 60s linear infinite; }
  @keyframes drift { from { background-position: 0 0; } to { background-position: 430px 0; } }
  @media (prefers-reduced-motion: reduce) { .clouds, .hz-idle, .hz-bounce, .payday-burst, .buildmsg, .crane-load, .spark, .particles span { animation: none !important; } }

  /* 시그니처: 나무 판자 UI */
  .plank { background: linear-gradient(180deg, var(--plank), var(--plank2));
           border: 2.5px solid var(--wood); border-radius: 12px;
           box-shadow: inset 0 2px 0 rgba(255,255,255,.45), inset 0 -3px 0 rgba(110,82,56,.3), 0 5px 0 var(--wood2), 0 12px 22px rgba(74,59,42,.18);
           position: relative; }
  .plank::before, .plank::after { content: ""; position: absolute; top: 8px; width: 5px; height: 5px;
           border-radius: 50%; background: var(--wood2); box-shadow: inset 0 1px 1px rgba(0,0,0,.4); }
  .plank::before { left: 8px; } .plank::after { right: 8px; }

  .screen-label, .sec-label { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; }
  .screen-label { color: var(--wood2); font-size: 15px; text-align: center; letter-spacing: .1em; margin-bottom: 12px; }
  .sec-label { color: var(--ink-soft); font-size: 14px; margin: 18px 0 8px; }
  .sec-label.dark { margin-top: 8px; }

  /* 타이틀 */
  .title-wrap { text-align: center; padding-top: 7vh; }
  .title-eyebrow { letter-spacing: .38em; font-size: 10.5px; color: var(--ink-soft); }
  .game-title { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 54px; line-height: 1.12;
                color: var(--wood2); text-shadow: 0 3px 0 #FFF, 0 6px 0 rgba(110,82,56,.25); margin: 8px 0; }
  .title-sub { color: var(--ink-soft); font-size: 13.5px; }
  .title-hero { margin: 18px 0 4px; filter: drop-shadow(0 4px 4px rgba(74,59,42,.25)); }
  .title-foot { margin-top: 24px; color: var(--ink-soft); font-size: 12px; }

  /* 마을 헤더 */
  .vhead { text-align: center; margin-bottom: 10px; }
  .vname { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 26px; color: var(--wood2); }
  .vtitle { font-size: 14px; color: var(--gold); }
  .vsub { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; }

  /* 자원 바 */
  .resbar { display: flex; gap: 4px; justify-content: space-around; align-items: center;
            padding: 10px 12px; margin-bottom: 12px;
            font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 15.5px; color: var(--ink); }
  .resbar-streak { color: var(--hot); }
  .buildmsg { text-align: center; font-family: 'Jua', sans-serif; color: var(--green); font-size: 15px;
              margin: -4px 0 10px; animation: pop .4s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* 마을 들판 + 부지 */
  .field { background: linear-gradient(180deg, var(--grass), var(--grass2));
           border: 2.5px solid var(--wood); border-radius: 16px; padding: 14px 12px 18px;
           box-shadow: inset 0 3px 0 rgba(255,255,255,.25), 0 5px 0 var(--wood2), 0 12px 22px rgba(74,59,42,.2);
           margin-bottom: 12px; position: relative; }
  .plots { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; position: relative; }
  .plot { border-radius: 12px; cursor: pointer; padding: 4px 4px 7px;
          display: flex; flex-direction: column; align-items: center; gap: 1px;
          background: rgba(255,255,255,.14); border: 2px solid rgba(110,82,56,.35);
          font-family: inherit; transition: transform .08s; }
  .plot:active { transform: scale(.96); }
  .plot.complete { background: rgba(255,253,244,.55); border-color: var(--gold);
                   box-shadow: 0 0 16px rgba(217,164,65,.5), 0 3px 0 #A87F2C; }
  .plot.sel { outline: 3px solid #FFF; outline-offset: 2px; }
  .plot-name { font-size: 10px; color: var(--ink); line-height: 1.25; text-align: center;
               font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; }
  .field-hero { position: absolute; right: -2px; bottom: -18px; pointer-events: none; filter: drop-shadow(0 3px 3px rgba(74,59,42,.3)); }
  .crane-load { animation: sway 2.4s ease-in-out infinite; transform-origin: 54px 33px; }
  @keyframes sway { 0%,100% { transform: rotate(-4deg);} 50% { transform: rotate(4deg);} }
  .spark { animation: sparkle 1.6s ease-in-out infinite; }
  @keyframes sparkle { 0%,100% { opacity: .5;} 50% { opacity: 1;} }

  .hz-idle { animation: breathe 3.2s ease-in-out infinite; transform-origin: 50% 92%; }
  @keyframes breathe { 0%,100% { transform: scale(1);} 50% { transform: scale(1.02);} }
  .hz-bounce { animation: hop .75s ease-in-out infinite; transform-origin: 50% 100%; }
  @keyframes hop { 0%,100% { transform: translateY(0);} 40% { transform: translateY(-6px) rotate(-1.5deg);} }

  /* 건물 상세 */
  .detail { padding: 13px 14px; margin-bottom: 12px; }
  .detail-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .detail-emoji { font-size: 32px; }
  .detail-info { min-width: 0; }
  .detail-name { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 17px; color: var(--ink); }
  .detail-desc { font-size: 11.5px; color: var(--ink-soft); }
  .btn-build { width: 100%; padding: 13px; border-radius: 10px; cursor: pointer;
               border: 2px solid var(--green); background: linear-gradient(180deg, #9CC47E, #7FA964);
               color: #2C401F; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 16px;
               box-shadow: 0 4px 0 #4E6B3D; }
  .btn-build:active { transform: translateY(3px); box-shadow: 0 1px 0 #4E6B3D; }
  .btn-build.no { opacity: .45; }
  .detail-need { font-size: 11.5px; color: var(--hot); text-align: center; margin-top: 7px; }
  .detail-done { text-align: center; font-family: 'Jua', sans-serif; color: var(--gold); font-size: 15px; padding: 4px 0; }

  /* 긴급/중단 */
  .urgent { display: flex; align-items: center; gap: 9px; width: 100%; padding: 12px 24px; margin-bottom: 11px;
            cursor: pointer; color: var(--ink); text-align: left; font-family: inherit; font-size: 13.5px; }
  .urgent-label { font-family: 'Jua', sans-serif; color: var(--hot); font-size: 12.5px; white-space: nowrap; }
  .urgent-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hold { padding: 12px 24px; margin-bottom: 11px; }
  .hold-task { font-size: 13px; line-height: 1.55; }
  .hold-reason { font-size: 11.5px; color: var(--hot); margin-top: 4px; }
  .hold-acts { display: flex; gap: 7px; margin-top: 10px; }

  .dd { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 12px; padding: 3px 10px;
        border-radius: 99px; white-space: nowrap; border: 1.5px solid; }
  .dd.hot { color: #9E3B2C; border-color: #C97B6E; background: rgba(199,81,70,.14); }
  .dd.warm { color: #8A6510; border-color: #C2A35C; background: rgba(217,164,65,.18); }
  .dd.free { color: #4F7A42; border-color: #8FB781; background: rgba(127,191,106,.18); }

  /* 버튼 */
  .btn-main { display: block; width: 100%; padding: 17px; margin-top: 14px; border: 2.5px solid var(--wood2);
              border-radius: 13px; cursor: pointer;
              background: linear-gradient(180deg, #F2CD7B, var(--gold) 55%, #BD8A2D);
              color: #3A2B07; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 19px;
              box-shadow: 0 5px 0 var(--wood2), 0 14px 26px rgba(217,164,65,.3); transition: transform .08s, box-shadow .08s; }
  .btn-main:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--wood2); }
  .btn-main:disabled { opacity: .4; }
  .btn-main.slim { margin-top: 0; flex: 1.6; font-size: 16px; padding: 14px; }
  .btn-flat { display: block; width: 100%; padding: 12px; margin-top: 11px; border-radius: 11px; cursor: pointer;
              background: rgba(255,255,255,.5); border: 1.5px dashed var(--wood); color: var(--ink-soft);
              font-size: 13px; font-family: inherit; }
  .btn-sub { padding: 10px 14px; border-radius: 9px; cursor: pointer; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif;
             font-size: 14px; border: 2px solid var(--wood); background: var(--cream); color: var(--ink-soft); }
  .btn-sub.gold { border-color: #A87F2C; background: linear-gradient(180deg, #F2CD7B, var(--gold)); color: #3A2B07; }
  .btn-sub.green { border-color: #4E6B3D; background: linear-gradient(180deg, #9CC47E, #7FA964); color: #2C401F; }
  .btn-sub:disabled { opacity: .4; }
  .btn-split { flex: 1; padding: 10px 8px; border: 2px solid #7B68C9; border-radius: 12px; cursor: pointer;
               background: linear-gradient(180deg, #C9BCF5, #A795E8); color: #2F2168;
               font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 14px; line-height: 1.3;
               box-shadow: 0 4px 0 #5A4A9E; }
  .btn-split span { font-family: 'Gowun Dodum', sans-serif; font-size: 10px; color: #4A3A85; }
  .btn-split:active { transform: translateY(3px); box-shadow: 0 1px 0 #5A4A9E; }

  /* 작업 일지 */
  .journal { margin-top: 18px; }
  .journal-item { display: flex; gap: 8px; align-items: baseline; padding: 9px 2px;
                  border-bottom: 1.5px dashed #C9B58E; font-size: 12.5px; }
  .journal-date { font-family: 'Jua', sans-serif; color: var(--hot); font-size: 12px; white-space: nowrap; }
  .journal-text { flex: 1; min-width: 0; line-height: 1.5; }
  .journal-spent { color: var(--ink-soft); font-size: 11px; white-space: nowrap; }

  /* 의뢰 게시판 */
  .board-hint { font-size: 12px; color: var(--ink-soft); text-align: center; line-height: 1.7; margin-bottom: 14px; }
  .board-hint.small { text-align: left; margin: 6px 0 0; }
  .order { padding: 13px 14px 13px; margin-bottom: 11px; }
  .order-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .order-main { flex: 1; min-width: 0; }
  .order-name { font-size: 14px; font-weight: 700; line-height: 1.45; }
  .order-note { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; line-height: 1.5; }
  .ico { width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px; cursor: pointer;
         border: 1.5px solid var(--wood); background: rgba(255,255,255,.6); color: var(--ink-soft); font-size: 13px; }
  .editbox { margin-top: 11px; padding-top: 11px; border-top: 1.5px dashed var(--wood);
             display: flex; flex-direction: column; gap: 8px; }
  .edit-row { display: flex; gap: 8px; }
  .edit-row input[type=date] { flex: 1; min-width: 0; }
  .order.new input { margin-bottom: 8px; }
  .order.new .edit-row input { margin-bottom: 0; }

  /* 입력 공통 */
  input[type=text], input[type=date], textarea {
    width: 100%; padding: 11px 12px; border-radius: 10px; font-size: 14px;
    font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif; outline: none;
    background: #FFFDF4; border: 1.5px solid var(--wood); color: var(--ink);
  }
  textarea { min-height: 70px; resize: vertical; }
  textarea:focus, input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(217,164,65,.2); }
  textarea::placeholder, input::placeholder { color: #B5A584; }

  /* 작업 준비 */
  .opt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
  .opt-grid.three { grid-template-columns: repeat(3, 1fr); }
  .opt { padding: 13px 6px; text-align: center; cursor: pointer; border-radius: 11px;
         background: #FFFDF4; border: 2px solid #D9C8A4; color: var(--ink); font-family: inherit;
         box-shadow: 0 3px 0 #D9C8A4; }
  .opt b { display: block; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 18px; font-weight: 400; }
  .opt i { font-style: normal; font-size: 10.5px; color: var(--ink-soft); }
  .opt.on { border-color: var(--gold); background: #FBF0D6; color: #8A6510; box-shadow: 0 3px 0 var(--gold); }
  .loot-preview { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 14px; }

  /* 작업 현장 */
  .site { padding: 16px 16px 14px; margin-bottom: 12px; }
  .site-tag { display: inline-block; font-family: 'Jua', sans-serif; font-size: 12px; color: #5A4A9E;
              border: 1.5px solid #A795E8; border-radius: 99px; padding: 2px 11px; background: rgba(167,149,232,.18); margin-top: 4px; }
  .site-name { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 20px; line-height: 1.45; margin: 10px 0 8px; }
  .site-why { font-size: 13px; line-height: 1.75; color: var(--ink-soft); margin-bottom: 12px; }
  .first-step { background: rgba(255,255,255,.55); border: 1.5px dashed var(--wood); border-radius: 10px;
                padding: 10px 12px; font-size: 13px; line-height: 1.6; }
  .first-step b { display: block; font-family: 'Jua', sans-serif; color: #8A6510; font-size: 12px; margin-bottom: 3px; font-weight: 400; }
  .site-meta { margin-top: 10px; font-size: 11px; color: var(--ink-soft); }
  .timer { display: flex; align-items: center; gap: 10px; padding: 10px 24px 10px 14px; margin-bottom: 4px; }
  .timer-t { font-family: 'Jua', sans-serif; font-size: 24px; letter-spacing: .05em; min-width: 72px; }
  .timer-lbl { flex: 1; min-width: 0; font-size: 11px; color: var(--ink-soft); line-height: 1.5; }
  .work-acts { display: flex; gap: 9px; margin-top: 13px; }
  .holdbox { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }

  /* 정산 */
  .payday-wrap { text-align: center; padding-top: 8vh; }
  .payday-burst { font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 42px; color: var(--gold);
                  text-shadow: 0 3px 0 #FFF, 0 6px 0 rgba(168,127,44,.3);
                  animation: burst .5s cubic-bezier(.2,1.7,.4,1) both; }
  @keyframes burst { from { transform: scale(2.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .payday-hero { margin: 14px 0 2px; filter: drop-shadow(0 4px 4px rgba(74,59,42,.25)); }
  .payday-msg { font-size: 13.5px; color: var(--ink-soft); }
  .loot-row { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
  .loot { padding: 12px 18px; }
  .loot b { display: block; font-family: 'Jua', sans-serif; font-size: 24px; color: var(--green); font-weight: 400; }
  .loot i { font-style: normal; font-size: 11px; color: var(--ink-soft); }
  .payday-total { margin-top: 16px; font-size: 12.5px; color: var(--ink-soft); }

  /* 번뜩 할 일 */
  .btn-flash { display: block; width: 100%; padding: 13px; margin-bottom: 11px; border-radius: 11px; cursor: pointer;
               border: 2px solid #C2A35C; background: linear-gradient(180deg, #FFF6DC, #F5E2AE);
               color: #8A6510; font-family: 'Jua', 'Apple SD Gothic Neo', sans-serif; font-size: 15px;
               box-shadow: 0 4px 0 #C2A35C; }
  .btn-flash:active { transform: translateY(3px); box-shadow: 0 1px 0 #C2A35C; }
  .flashbox { padding: 13px 14px; margin-bottom: 11px; display: flex; flex-direction: column; gap: 8px; }
  select { width: 100%; padding: 11px 12px; border-radius: 10px; font-size: 13.5px;
           font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif; outline: none;
           background: #FFFDF4; border: 1.5px solid var(--wood); color: var(--ink);
           -webkit-appearance: none; appearance: none; }
  select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(217,164,65,.2); }

  /* 의뢰별 할 일 목록 */
  .todos { margin-top: 10px; padding-top: 9px; border-top: 1.5px dashed var(--wood); }
  .todo { display: flex; align-items: center; gap: 7px; padding: 5px 0; font-size: 13px; }
  .todo.done .todo-text { text-decoration: line-through; color: #A89B82; }
  .todo-check { border: none; background: none; cursor: pointer; font-size: 16px; color: var(--ink); padding: 0; line-height: 1; }
  .todo-text { flex: 1; min-width: 0; line-height: 1.5; }
  .todo-del { border: none; background: none; cursor: pointer; color: #B5A584; font-size: 12px; padding: 2px 4px; }
  .todo-add { display: flex; gap: 7px; margin-top: 6px; }
  .todo-add input { flex: 1; min-width: 0; padding: 9px 11px; font-size: 12.5px; }
  .todo-add .btn-sub { padding: 8px 13px; font-size: 13px; }

  /* 정산 파티클 */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
  .particles span { position: absolute; bottom: -10%; font-size: 24px; opacity: 0;
                    animation: rise 2.4s ease-out forwards; }
  .particles span:nth-child(1) { left: 14%; animation-delay: .05s; }
  .particles span:nth-child(2) { left: 30%; animation-delay: .3s; font-size: 20px; }
  .particles span:nth-child(3) { left: 50%; animation-delay: .15s; font-size: 28px; }
  .particles span:nth-child(4) { left: 66%; animation-delay: .45s; }
  .particles span:nth-child(5) { left: 80%; animation-delay: .25s; font-size: 20px; }
  .particles span:nth-child(6) { left: 42%; animation-delay: .6s; font-size: 18px; }
  @keyframes rise { 0% { transform: translateY(0) rotate(0); opacity: 0; }
                    15% { opacity: 1; }
                    100% { transform: translateY(-78vh) rotate(24deg); opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ═══════════════════════════════════════
   하젤마을 타이쿤 v2 — HAZEL VILLAGE TYCOON
   현실의 작업 = 자원 = 마을 건설
   ═══════════════════════════════════════ */

const todayKey = () => {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
};
const daysBetween = (a, b) => Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000);
const dday = (dl) => (dl ? daysBetween(todayKey(), dl) : null);
const ddayLabel = (dl) => {
  const n = dday(dl);
  if (n === null) return "자유";
  if (n === 0) return "오늘!";
  return n > 0 ? "D-" + n : Math.abs(n) + "일 지남";
};

/* ── 효과음 (실패해도 게임은 계속) ── */
let audioCtx = null;
function sfx(kind) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const notes = kind === "build" ? [392, 523, 659] : kind === "done" ? [523, 659, 784] : [659];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = "triangle"; o.frequency.value = f;
      g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.09);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.09 + 0.25);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(audioCtx.currentTime + i * 0.09); o.stop(audioCtx.currentTime + i * 0.09 + 0.3);
    });
  } catch (e) {}
}

/* ── 작업 의뢰 엔진: 네가 적어둔 할 일이 1순위 ── */
const FREE_JOBS = [
  { task: "노션대학 인스타에 다음 콘텐츠 1개 올리기", first: "인스타 앱을 열고 새 게시물을 누른다", venture: "노션대학" },

  { task: "구매대행 잠재 고객 1명에게 의향 묻는 메시지 보내기", first: "인스타 DM을 열고 떠오르는 1명을 검색한다", venture: "구매대행" },
];
function forgeJob(projects, history, blocked, time, energy) {
  const blockedText = blocked.map((b) => (b.task.venture || "") + " " + b.task.task).join(" ");
  const sorted = [...projects].sort((a, b) => {
    const da = dday(a.deadline), db = dday(b.deadline);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
  const usable = sorted.filter((p) => !blockedText.includes(p.name));
  const withDeadline = usable.filter((p) => p.deadline);
  const last = history[history.length - 1];
  let target = withDeadline[0];
  if (target && last && last.venture === target.name && withDeadline[1] && dday(withDeadline[1].deadline) <= 7) {
    target = withDeadline[1];
  }
  // 1순위: 대상 의뢰에 네가 적어둔 할 일이 있으면 그걸 그대로
  const pickTodo = (proj) => {
    if (!proj || !proj.todos) return null;
    const blockedTasks = blocked.map((b) => b.task.task);
    return proj.todos.find((t) => !t.done && !blockedTasks.includes(t.text)) || null;
  };
  let todoProj = target, todo = pickTodo(target);
  if (!todo) {
    for (const p of usable) { const t = pickTodo(p); if (t) { todoProj = p; todo = t; break; } }
  }
  if (todo) {
    const d = todoProj.deadline ? "납기 " + ddayLabel(todoProj.deadline) + ". " : "";
    return { task: todo.text, why: d + "네가 직접 적어둔 할 일이야 — 떠올랐을 때 적어둔 너, 잘했다.", firstStep: "이 할 일에 필요한 앱이나 파일을 연다", venture: todoProj.name, minutes: Math.min(time, energy === "low" ? 15 : 30), ref: { pid: todoProj.id, tid: todo.id } };
  }
  if (target) {
    const d = ddayLabel(target.deadline);
    if (energy === "low" || time <= 10) {
      return { task: target.name + " — 가장 쉬운 조각 하나만 처리하기", why: "납기 " + d + ". 컨디션 낮은 날엔 만만한 자재 하나만 옮겨도 공사는 굴러가.", firstStep: "이 작업에 필요한 앱이나 파일을 연다", venture: target.name, minutes: Math.min(time, 10) };
    }
    if (time >= 60 && energy === "high") {
      return { task: target.name + " — 완료에 가장 가까워지는 큰 덩어리 하나 끝내기", why: "납기 " + d + "! 풀파워일 때 대형 자재를 옮겨야 보상이 커.", firstStep: "이 작업의 앱이나 파일을 열고, 끝낼 덩어리 하나를 정한다", venture: target.name, minutes: Math.min(time, 90) };
    }
    return { task: target.name + " — 다음 한 걸음 전진시키기", why: "납기 " + d + ". 매일 한 걸음이면 납기 전에 준공돼.", firstStep: "이 작업의 앱이나 파일을 연다", venture: target.name, minutes: Math.min(time, 30) };
  }
  const q = FREE_JOBS[history.length % FREE_JOBS.length];
  return { task: q.task, why: "납기 의뢰가 없을 땐, 세상 밖으로 내보내는 작업이 제일 비싼 자원을 줘.", firstStep: q.first, venture: q.venture, minutes: Math.min(time, 30) };
}

function calcLoot(minutes, streak) {
  const wood = 3 + Math.floor(minutes / 10);
  const brick = minutes >= 20 ? 1 + Math.floor(minutes / 30) : 0;
  let gold = minutes >= 60 ? 1 : 0;
  if (streak >= 3) gold += 1;
  return { wood, brick, gold };
}

  if (!st) return null;
  st.projects = (st.projects || DEFAULT_PROJECTS).map((p) => ({ ...p, todos: p.todos || [] }));
  st.blocked = st.blocked || [];
  st.res = st.res || { wood: 0, brick: 0, gold: 0 };
  st.built = st.built || {};

};

  useEffect(() => {
    if (timerOn) tickRef.current = setInterval(() => setElapsed((s) => s + 1), 1000);
    else if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; }
    return () => { if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; } };
  }, [timerOn]);
  const fmt = (s) => String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");

  const { history, projects, blocked, res, built } = state;
  const stagePts = Object.values(built).reduce((a, b) => a + b, 0);
  const completedCount = BUILDINGS.filter((b) => (built[b.id] || 0) >= 3).length;
  const pop = stagePts * 3 + completedCount * 5;
  const doneDates = [...new Set(history.map((h) => h.date))].sort();
  const doneToday = doneDates.includes(todayKey());
  let streak = 0;
  if (doneDates.length) {
    const gap = daysBetween(doneDates[doneDates.length - 1], todayKey());
    if (gap <= 1) {
      streak = 1;
      for (let i = doneDates.length - 1; i > 0; i--) {
        if (daysBetween(doneDates[i - 1], doneDates[i]) === 1) streak++; else break;
      }
    }
  }
  const sortedProjects = [...projects].sort((a, b) => {
    const da = dday(a.deadline), db = dday(b.deadline);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
  const urgent = sortedProjects.find((p) => p.deadline);
  const openTodos = projects.reduce((n, p) => n + p.todos.filter((t) => !t.done).length, 0);

  /* 작업 흐름 */
  const startJob = () => {
    const q = forgeJob(projects, history, blocked, time, energy);
    persist({ ...state, currentTask: q, shrinkCount: 0 });
    setElapsed(0); setTimerOn(false); setShowBlockInput(false); setBlockReason("");
    setScreen("work");
  };
  const splitJob = () => {
    const cur = state.currentTask; if (!cur) return;
    const count = state.shrinkCount || 0;
    const base = (cur.baseTask || cur.task).split(" — ")[0];
    const rung = SPLIT_LADDER[Math.min(count, SPLIT_LADDER.length - 1)];
    persist({ ...state, currentTask: { ...cur, baseTask: base, task: base + rung.suffix, why: rung.why, firstStep: rung.first, minutes: rung.min }, shrinkCount: count + 1 });
  };
  const finishJob = () => {
    if (!outputLine.trim()) return;
    setTimerOn(false);
    const cur = state.currentTask;
    const loot = calcLoot(cur.minutes || 10, streak);
    const entry = { date: todayKey(), task: cur.task, venture: cur.venture, output: outputLine.trim(), spent: elapsed > 0 ? Math.round(elapsed / 60) : null };
    // 번뜩 할 일에서 나온 작업이면 자동 체크
    let nextProjects = projects;
    if (cur.ref) {
      nextProjects = projects.map((p) => p.id === cur.ref.pid
        ? { ...p, todos: p.todos.map((t) => (t.id === cur.ref.tid ? { ...t, done: true } : t)) }
        : p);
    }
    setLastLoot(loot);
    sfx("done");
    persist({
      ...state, projects: nextProjects,
      res: { wood: res.wood + loot.wood, brick: res.brick + loot.brick, gold: res.gold + loot.gold },
      history: [...history, entry], currentTask: null, shrinkCount: 0,
    });
    setOutputLine("");
    setScreen("payday");
  };
  const holdJob = () => {
    if (!blockReason.trim()) return;
    setTimerOn(false);
    const entry = { id: "b" + Date.now(), task: state.currentTask, reason: blockReason.trim(), date: todayKey() };
    persist({ ...state, blocked: [...blocked, entry], currentTask: null, shrinkCount: 0 });
    setBlockReason(""); setShowBlockInput(false); setTime(null); setEnergy(null);
    setScreen("village");
  };
  const releaseHold = (id, resume) => {
    const item = blocked.find((b) => b.id === id);
    const restB = blocked.filter((b) => b.id !== id);
    if (resume && item) {
      persist({ ...state, blocked: restB, currentTask: { ...item.task, why: "자재가 입고됐다! 식기 전에 바로 잇자." }, shrinkCount: 0 });
      setElapsed(0); setTimerOn(false);
      setScreen("work");
    } else {
      persist({ ...state, blocked: restB });
    }
  };
  const quitJob = () => {
    setTimerOn(false);
    persist({ ...state, currentTask: null, shrinkCount: 0 });
    setTime(null); setEnergy(null); setShowBlockInput(false); setBlockReason("");
    setScreen("village");
  };

  /* 건설 */
  const construct = (b) => {
    const cur = built[b.id] || 0;
    if (cur >= 3) return;
    const cost = b.stages[cur];
    if (!canAfford(res, cost)) return;
    const nextStage = cur + 1;
    sfx("build");
    persist({
      ...state,
      res: { wood: res.wood - (cost.w || 0), brick: res.brick - (cost.b || 0), gold: res.gold - (cost.g || 0) },
      built: { ...built, [b.id]: nextStage },
    });
    setBuildMsg(nextStage >= 3 ? "🎉 " + b.name + " 완공!" : "🔨 " + b.name + " — " + STAGE_NAMES[nextStage]);
    setTimeout(() => setBuildMsg(""), 2500);
  };

  /* 번뜩 할 일 캡처 */
  const saveFlash = () => {
    if (!flashText.trim()) return;
    const pid = flashProj || (urgent ? urgent.id : (projects[0] && projects[0].id));
    if (!pid) return;
    persist({ ...state, projects: projects.map((p) => p.id === pid ? { ...p, todos: [...p.todos, { id: "t" + Date.now(), text: flashText.trim(), done: false }] } : p) });
    setFlashText(""); setFlash(false);
    setBuildMsg("💡 할 일 접수! 다음 작업 뽑기에 반영돼");
    setTimeout(() => setBuildMsg(""), 2200);
  };
  const addTodo = (pid) => {
    const txt = (todoText[pid] || "").trim();
    if (!txt) return;
    persist({ ...state, projects: projects.map((p) => p.id === pid ? { ...p, todos: [...p.todos, { id: "t" + Date.now(), text: txt, done: false }] } : p) });
    setTodoText({ ...todoText, [pid]: "" });
  };
  const toggleTodo = (pid, tid) => {
    persist({ ...state, projects: projects.map((p) => p.id === pid ? { ...p, todos: p.todos.map((t) => (t.id === tid ? { ...t, done: !t.done } : t)) } : p) });
  };
  const removeTodo = (pid, tid) => {
    persist({ ...state, projects: projects.map((p) => p.id === pid ? { ...p, todos: p.todos.filter((t) => t.id !== tid) } : p) });
  };

  /* 의뢰 관리 */
  const addProject = () => {
    if (!pName.trim()) return;
    persist({ ...state, projects: [...projects, { id: "p" + Date.now(), name: pName.trim(), deadline: pDate || "", note: pNote.trim(), todos: [] }] });
    setPName(""); setPDate(""); setPNote("");
  };
  const removeProject = (id) => {
    persist({ ...state, projects: projects.filter((p) => p.id !== id) });
    if (editId === id) setEditId(null);
  };
  const startEdit = (p) => { setEditId(p.id); setEditName(p.name); setEditDate(p.deadline || ""); setEditNote(p.note || ""); };
  const saveEdit = () => {
    if (!editName.trim()) return;
    persist({ ...state, projects: projects.map((p) => (p.id === editId ? { ...p, name: editName.trim(), deadline: editDate || "", note: editNote.trim() } : p)) });
    setEditId(null);
  };

  const ddClass = (dl) => { const n = dday(dl); if (n === null) return "free"; if (n <= 7) return "hot"; if (n <= 21) return "warm"; return "free"; };

  const FlashPanel = () => (
    flash ? (
      <div className="plank flashbox">
        <div className="sec-label dark">💡 갑자기 떠오른 할 일</div>
        <input type="text" autoFocus value={flashText} onChange={(e) => setFlashText(e.target.value)} placeholder="예: 워크북 표지 오타 고치기" />
        <select value={flashProj || (urgent ? urgent.id : "")} onChange={(e) => setFlashProj(e.target.value)}>
          {sortedProjects.map((p) => <option key={p.id} value={p.id}>{p.name} ({ddayLabel(p.deadline)})</option>)}
        </select>
        <div className="edit-row">
          <button className="btn-sub gold" disabled={!flashText.trim()} onClick={saveFlash}>적어두기</button>
          <button className="btn-sub" onClick={() => { setFlash(false); setFlashText(""); }}>취소</button>
        </div>
        <div className="board-hint small">적어두면 작업 뽑기가 이걸 1순위로 골라줘.</div>
      </div>
    ) : (
      <button className="btn-flash" onClick={() => setFlash(true)}>💡 할 일이 번뜩 떠올랐어!{openTodos > 0 ? " (대기 " + openTodos + "개)" : ""}</button>
    )
  );

  /* ═══════════ 화면 ═══════════ */

  if (screen === "title") {
    return (
      <div className="tycoon">
        <div className="clouds" aria-hidden="true"></div>
        <div className="wrap title-wrap">
          <div className="title-eyebrow">HAZEL VILLAGE TYCOON</div>
          <h1 className="game-title">하젤마을<br />타이쿤</h1>
          <div className="title-sub">현실의 작업으로 자원을 캐고, 마을을 짓는 게임</div>
          <div className="title-hero"><Hazel grown={stagePts} size={140} happy /></div>
          <button className="btn-main" onClick={() => setScreen("village")}>{history.length > 0 ? "마을로 돌아가기" : "개척 시작"}</button>
          <div className="title-foot">아무것도 하지 않으면 아무것도 지어지지 않는다</div>
        </div>
      </div>
    );
  }

  if (screen === "village") {
    return (
      <div className="tycoon">
        <div className="clouds" aria-hidden="true"></div>
        <div className="wrap">
          <div className="vhead">
            <div className="vname">하젤마을 <span className="vtitle">{villageTitle(stagePts)}</span></div>
            <div className="vsub">👥 주민 {pop}명 · 완공 {completedCount}/6 · 하젤 직급: {hazelRank(stagePts)}</div>
          </div>
          <div className="resbar plank">
            <span>🪵 {res.wood}</span><span>🧱 {res.brick}</span><span>🪙 {res.gold}</span>
            <span className="resbar-streak">🔥 {streak}일</span>
          </div>
          {buildMsg && <div className="buildmsg">{buildMsg}</div>}
          <div className="field">
            <div className="plots">
              {BUILDINGS.map((b) => {
                const st = built[b.id] || 0;
                const isSel = selected === b.id;
                return (
                  <button key={b.id} className={"plot" + (isSel ? " sel" : "") + (st >= 3 ? " complete" : "")} onClick={() => setSelected(isSel ? null : b.id)}>
                    <Building b={b} stage={st} size={92} />
                    <span className="plot-name">{st === 0 ? "빈 터" : b.name}{st > 0 && st < 3 ? " " + st + "/3" : ""}</span>
                  </button>
                );
              })}
            </div>
            <div className="field-hero"><Hazel grown={stagePts} size={64} /></div>
          </div>
          {selected && (() => {
            const b = BUILDINGS.find((x) => x.id === selected);
            const st = built[b.id] || 0;
            const cost = st < 3 ? b.stages[st] : null;
            return (
              <div className="plank detail">
                <div className="detail-top">
                  <Building b={b} stage={st} size={58} />
                  <div className="detail-info">
                    <div className="detail-name">{b.name}</div>
                    <div className="detail-desc">{b.desc} · {STAGE_NAMES[st]}</div>
                  </div>
                </div>
                {cost ? (
                  <button className={"btn-build" + (canAfford(res, cost) ? "" : " no")} disabled={!canAfford(res, cost)} onClick={() => construct(b)}>
                    {st === 0 ? "착공" : st === 1 ? "골조 올리기" : "완공시키기"} — {costText(cost)}
                  </button>
                ) : (
                  <div className="detail-done">완공! 주민들이 모여든다 ✨</div>
                )}
                {cost && !canAfford(res, cost) && <div className="detail-need">자원이 부족해 — 작업을 나가서 캐오자!</div>}
              </div>
            );
          })()}
          <FlashPanel />
          {urgent && (
            <button className="plank urgent" onClick={() => setScreen("board")}>
              <span className="urgent-label">납기 임박</span>
              <span className="urgent-name">{urgent.name}</span>
              <span className={"dd " + ddClass(urgent.deadline)}>{ddayLabel(urgent.deadline)}</span>
            </button>
          )}
          {blocked.length > 0 && blocked.map((b) => (
            <div className="plank hold" key={b.id}>
              <div className="hold-task">⏸ {b.task.task}</div>
              <div className="hold-reason">중단 사유: {b.reason}</div>
              <div className="hold-acts">
                <button className="btn-sub green" onClick={() => releaseHold(b.id, true)}>재개 → 현장으로</button>
                <button className="btn-sub" onClick={() => releaseHold(b.id, false)}>철거</button>
              </div>
            </div>
          ))}
          <button className="btn-main" onClick={() => setScreen("prepare")}>⛏ {doneToday ? "한 탕 더 나가기" : "오늘의 작업 나가기"}</button>
          <button className="btn-flat" onClick={() => setScreen("board")}>📋 의뢰 게시판 — 목표 {projects.length}개 · 할 일 {openTodos}개</button>
          {history.length > 0 && (
            <div className="journal">
              <div className="sec-label">📒 작업 일지</div>
              {history.slice(-6).reverse().map((h, i) => (
                <div className="journal-item" key={i}>
                  <span className="journal-date">{h.date.slice(5).replace("-", "/")}</span>
                  <span className="journal-text">{h.output}</span>
                  {h.spent ? <span className="journal-spent">{h.spent}분</span> : null}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  if (screen === "board") {
    return (
      <div className="tycoon">
        <div className="clouds" aria-hidden="true"></div>
        <div className="wrap">
          <div className="screen-label">📋 의뢰 게시판</div>
          <div className="board-hint">작업은 납기 급한 의뢰의 ☐ 할 일부터 나와. ✎로 의뢰를 고치고, 떠오른 할 일은 바로 적어둬.</div>
          <FlashPanel />
          {sortedProjects.map((p) => (
            <div className="plank order" key={p.id}>
              <div className="order-row">
                <div className="order-main">
                  <div className="order-name">{p.name}</div>
                  {p.note ? <div className="order-note">{p.note}</div> : null}
                </div>
                <span className={"dd " + ddClass(p.deadline)}>{ddayLabel(p.deadline)}</span>
                <button className="ico" onClick={() => (editId === p.id ? setEditId(null) : startEdit(p))} aria-label="편집">✎</button>
                <button className="ico" onClick={() => removeProject(p.id)} aria-label="삭제">✕</button>
              </div>
              {editId === p.id && (
                <div className="editbox">
                  <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} placeholder="의뢰 이름" />
                  <input type="text" value={editNote} onChange={(e) => setEditNote(e.target.value)} placeholder="메모 (선택)" />
                  <div className="edit-row">
                    <input type="date" value={editDate} onChange={(e) => setEditDate(e.target.value)} />
                    <button className="btn-sub gold" onClick={saveEdit}>저장</button>
                    <button className="btn-sub" onClick={() => setEditId(null)}>취소</button>
                  </div>
                  <div className="board-hint small">날짜를 비우면 "자유" 의뢰가 돼</div>
                </div>
              )}
              <div className="todos">
                {p.todos.map((t) => (
                  <div className={"todo" + (t.done ? " done" : "")} key={t.id}>
                    <button className="todo-check" onClick={() => toggleTodo(p.id, t.id)}>{t.done ? "☑" : "☐"}</button>
                    <span className="todo-text">{t.text}</span>
                    <button className="todo-del" onClick={() => removeTodo(p.id, t.id)}>✕</button>
                  </div>
                ))}
                <div className="todo-add">
                  <input type="text" value={todoText[p.id] || ""} onChange={(e) => setTodoText({ ...todoText, [p.id]: e.target.value })} placeholder="+ 이 의뢰에 할 일 적어두기" />
                  <button className="btn-sub gold" disabled={!(todoText[p.id] || "").trim()} onClick={() => addTodo(p.id)}>추가</button>
                </div>
              </div>
            </div>
          ))}
          <div className="plank order new">
            <div className="sec-label dark">새 의뢰 붙이기</div>
            <input type="text" placeholder="의뢰 이름 (예: 구매대행 인스타 개설)" value={pName} onChange={(e) => setPName(e.target.value)} />
            <input type="text" placeholder="메모 (선택)" value={pNote} onChange={(e) => setPNote(e.target.value)} />
            <div className="edit-row">
              <input type="date" value={pDate} onChange={(e) => setPDate(e.target.value)} />
              <button className="btn-sub gold" disabled={!pName.trim()} onClick={addProject}>붙이기</button>
            </div>
          </div>
          <button className="btn-flat" onClick={() => setScreen("village")}>← 마을로 돌아가기</button>
        </div>
      </div>
    );
  }

  if (screen === "prepare") {
    return (
      <div className="tycoon">
        <div className="clouds" aria-hidden="true"></div>
        <div className="wrap">
          <div className="screen-label">⛏ 작업 준비</div>
          <div className="sec-label">쓸 수 있는 시간</div>
          <div className="opt-grid">
            {TIME_OPTIONS.map((o) => (
              <button key={o.value} className={"opt" + (time === o.value ? " on" : "")} onClick={() => setTime(o.value)}>
                <b>{o.label}</b><i>{o.sub}</i>
              </button>
            ))}
          </div>
          <div className="sec-label">기력</div>
          <div className="opt-grid three">
            {ENERGY_OPTIONS.map((o) => (
              <button key={o.value} className={"opt" + (energy === o.value ? " on" : "")} onClick={() => setEnergy(o.value)}>
                <b>{o.label}</b><i>{o.sub}</i>
              </button>
            ))}
          </div>
          <div className="loot-preview">예상 보상: 🪵 {time ? 3 + Math.floor(time / 10) : "?"} {time >= 20 ? "🧱 " + (1 + Math.floor(time / 30)) : ""} {time >= 60 ? "🪙 1" : ""}{streak >= 3 ? " (+연속 보너스 🪙1)" : ""}</div>
          <button className="btn-main" disabled={!time || !energy} onClick={startJob}>작업 의뢰 받기</button>
          <button className="btn-flat" onClick={() => setScreen("village")}>← 마을로</button>
        </div>
      </div>
    );
  }

  if (screen === "work" && state.currentTask) {
    const t = state.currentTask;
    return (
      <div className="tycoon">
        <div className="clouds" aria-hidden="true"></div>
        <div className="wrap">
          <div className="screen-label">🔨 작업 현장</div>
          <div className="plank site">
            <div className="site-tag">{t.venture}{t.ref ? " · 💡 네가 적어둔 할 일" : ""}{state.shrinkCount > 0 ? " · 공정 분할 ×" + state.shrinkCount : ""}</div>
            <div className="site-name">{t.task}</div>
            <div className="site-why">{t.why}</div>
            <div className="first-step"><b>첫 삽 (30초)</b>{t.firstStep}</div>
            <div className="site-meta">예상 작업 {t.minutes}분 · 보상 🪵{3 + Math.floor((t.minutes || 10) / 10)}{(t.minutes || 0) >= 20 ? " 🧱" + (1 + Math.floor(t.minutes / 30)) : ""}{(t.minutes || 0) >= 60 ? " 🪙1" : ""}</div>
          </div>
          <div className="plank timer">
            <span className="timer-t">{fmt(elapsed)}</span>
            <span className="timer-lbl">{timerOn ? "작업 중! 하젤 시장이 현장 순찰 중" : "시작을 누르면 작업 시간이 흘러 (선택)"}</span>
            <button className={"btn-sub " + (timerOn ? "" : "green")} onClick={() => setTimerOn(!timerOn)}>{timerOn ? "정지" : "시작"}</button>
          </div>
          <div className="sec-label">작업 보고 — 뭘 끝냈는지 한 줄</div>
          <textarea value={outputLine} onChange={(e) => setOutputLine(e.target.value)} placeholder="예: 서류 조립 끝! / 티저 1장 올림" />
          <div className="work-acts">
            <button className="btn-main slim" disabled={!outputLine.trim()} onClick={finishJob}>작업 완료! 정산</button>
            <button className="btn-split" onClick={splitJob}>⚒ 공정 분할<br /><span>더 작은 작업으로</span></button>
          </div>
          {!showBlockInput ? (
            <button className="btn-flat" onClick={() => setShowBlockInput(true)}>⏸ 지금은 못 해 — 사유 적고 공사 중단</button>
          ) : (
            <div className="holdbox">
              <input type="text" value={blockReason} onChange={(e) => setBlockReason(e.target.value)} placeholder="예: 프린터가 없어서 / 답장 대기 중" />
              <div className="edit-row">
                <button className="btn-sub gold" disabled={!blockReason.trim()} onClick={holdJob}>중단해두기</button>
                <button className="btn-sub" onClick={() => { setShowBlockInput(false); setBlockReason(""); }}>취소</button>
              </div>
            </div>
          )}
          <button className="btn-flat" onClick={quitJob}>퇴근 (마을로)</button>
        </div>
      </div>
    );
  }

  if (screen === "payday") {
    return (
      <div className="tycoon">
        <div className="clouds" aria-hidden="true"></div>
        <div className="particles" aria-hidden="true">
          <span>🪵</span><span>🧱</span><span>🪙</span><span>🪵</span><span>✨</span><span>🪵</span>
        </div>
        <div className="wrap payday-wrap">
          <div className="payday-burst">정산 완료!</div>
          <div className="payday-hero"><Hazel grown={stagePts} size={116} happy /></div>
          <div className="payday-msg">하젤이 수레 가득 자원을 싣고 돌아왔다</div>
          <div className="loot-row">
            <div className="loot plank"><b>+{lastLoot.wood}</b><i>🪵 목재</i></div>
            {lastLoot.brick > 0 && <div className="loot plank"><b>+{lastLoot.brick}</b><i>🧱 벽돌</i></div>}
            {lastLoot.gold > 0 && <div className="loot plank"><b>+{lastLoot.gold}</b><i>🪙 금</i></div>}
          </div>
          <div className="payday-total">보유: 🪵 {res.wood} · 🧱 {res.brick} · 🪙 {res.gold}</div>
          <button className="btn-main" onClick={() => { setTime(null); setEnergy(null); setScreen("village"); }}>마을로 — 건설하러 가기</button>
        </div>
      </div>
    );
  }

  return (
    <div className="tycoon"><div className="wrap"><button className="btn-main" onClick={() => setScreen("village")}>마을로</button></div></div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Game />);

</script>
</body>
</html>
