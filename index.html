  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const todayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    };
    const daysBetween = (a, b) => Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000);
    const dday = (dl) => (dl ? daysBetween(todayKey(), dl) : null);
    const ddayLabel = (dl) => {
      const n = dday(dl);
      if (n === null) return "여유";
      if (n === 0) return "오늘!";
      return n > 0 ? `D-${n}` : `${Math.abs(n)}일 지남`;
    };

    const DOG_STAGES = [
      { min: 0, title: "아기 솜뭉치", desc: "막 태어났어요. 뼈다귀 5개면 자라요" },
      { min: 5, title: "꼬마 탐험가", desc: "빨간 손수건을 맸어요!" },
      { min: 15, title: "늠름한 단짝", desc: "메달을 달았어요. 믿음직해요" },
      { min: 30, title: "전설의 황금 강아지", desc: "왕관을 썼어요. 윌로우와 코이도 인정!" },
    ];
    const getStageIdx = (total) => (total >= 30 ? 3 : total >= 15 ? 2 : total >= 5 ? 1 : 0);
    const nextStageAt = (total) => {
      const next = DOG_STAGES.find((s) => s.min > total);
      return next ? next.min - total : null;
    };

    function Danchu({ stageIdx, size = 110, happy = false }) {
      const scale = [0.78, 0.9, 1, 1][stageIdx];
      return (
        <svg width={size} height={size} viewBox="0 0 120 120" aria-label="강아지 단추">
          <g transform={`translate(60 64) scale(${scale}) translate(-60 -64)`} className={happy ? "danchu-bounce" : "danchu-idle"}>
            <path d="M97 78 Q110 70 106 58" stroke="#C99B53" strokeWidth="8" strokeLinecap="round" fill="none" className="tail" />
            <ellipse cx="72" cy="84" rx="28" ry="20" fill="#E0B36A" />
            <ellipse cx="72" cy="90" rx="18" ry="11" fill="#F2DCB3" />
            <ellipse cx="58" cy="100" rx="7" ry="5" fill="#D8A85C" />
            <ellipse cx="80" cy="100" rx="7" ry="5" fill="#D8A85C" />
            <circle cx="42" cy="58" r="26" fill="#E0B36A" />
            <path d="M22 44 Q12 58 20 72 Q30 66 30 50 Z" fill="#B98445" />
            <path d="M62 44 Q72 58 64 72 Q54 66 54 50 Z" fill="#B98445" />
            <ellipse cx="42" cy="68" rx="13" ry="10" fill="#F2DCB3" />
            <ellipse cx="42" cy="63" rx="4.5" ry="3.5" fill="#5B4A38" />
            <circle cx="33" cy="54" r="3" fill="#5B4A38" />
            <circle cx="51" cy="54" r="3" fill="#5B4A38" />
            <circle cx="34" cy="53" r="1" fill="#FFF" />
            <circle cx="52" cy="53" r="1" fill="#FFF" />
            {happy && <path d="M40 72 Q42 79 46 73 Q44 70 40 72" fill="#E2837B" />}
            <circle cx="27" cy="63" r="3.5" fill="#F0BFA0" opacity="0.7" />
            <circle cx="57" cy="63" r="3.5" fill="#F0BFA0" opacity="0.7" />
            {stageIdx >= 1 && <path d="M28 76 L56 76 L42 90 Z" fill="#C75146" />}
            {stageIdx >= 2 && <><circle cx="42" cy="86" r="5" fill="#D9A441" stroke="#B07F23" strokeWidth="1.5" /><path d="M42 84 L43.5 88 L40.5 88 Z" fill="#FFF3D6" /></>}
            {stageIdx >= 3 && <path d="M28 34 L33 25 L38 32 L42 23 L46 32 L51 25 L56 34 Z" fill="#D9A441" stroke="#B07F23" strokeWidth="1.5" strokeLinejoin="round" />}
          </g>
        </svg>
      );
    }

    const DEFAULT_PROJECTS = [
      { id: "p1", name: "I-751 서류 제출", deadline: "2026-07-01", note: "서류 조립 완료 후 발송" },
      { id: "p2", name: "노션대학 7일 챌린지 배포", deadline: "2026-06-30", note: "워크북 최종 배포 (90%)" },
      { id: "p3", name: "구매대행 브랜드 론칭", deadline: "", note: "브랜드명 확정 + 기초 세팅 (20%)" },
    ];

    const BASE_CONTEXT = `당신은 "퀀텀 원"이라는 실행 엔진입니다. 사용자는 하젤:
- 휴스턴 K BBQ 레스토랑 총괄 매니저 (본업)
- 노션대학 운영 (인스타 @effi_land)
- 한국↔미국 구매대행 사업 준비 중
- 코딩 비전공이지만 앱을 출시함. iPad만 사용.
- 블로그 습관 만들고 싶어함 (에피소드형 글)
- 좌우명: "아무것도 하지 않으면 아무것도 이뤄지지 않는다"

당신의 임무: 지금 이 순간 가장 중요한 행동 딱 1개를 고르는 것.

우선순위:
1. 마감일이 가까운 큰 목표가 무조건 최우선. 7일 이내면 다른 모든 것보다 먼저.
2. 마감 목표가 없거나 모두 여유 있으면: 거의 완성됐는데 미출시인 것을 세상에 내보내기 > 잠재 고객/독자 접점 만들기 > 수익 파이프라인 첫 단추.
3. 행동은 가능한 "바깥으로 내보내는" 방향 (발송/제출/발행/업로드/문의/신청).
4. 정리, 계획 세우기, 리스트 작성, 막연한 리서치는 절대 제안 금지.
5. 주어진 시간 안에 끝낼 수 있어야 하고, 에너지가 낮으면 더 작은 행동.
6. firstStep은 30초 안에 물리적으로 시작 가능한 동작.
7. 최근 완료한 행동과 중복 금지.
8. [중요] "잠시 멈춘 퀘스트" 목록에 있는 것과 같거나 비슷한 행동은 절대 제안 금지.

반드시 아래 JSON만 출력 (마크다운, 백틱, 설명 금지):
{"task":"행동 한 문장 (~하기)","why":"이게 왜 지금 1순위인지 1-2문장","firstStep":"30초 안에 시작하는 첫 동작","venture":"관련 목표명 또는 영역","minutes":숫자}`;

    const FALLBACK_TASKS = [
      { task: "노션대학 인스타에 7일 챌린지 티저 1장 올리기", why: "90% 완성된 워크북, 세상은 아직 몰라. 예고만 해도 배포가 현실이 돼.", firstStep: "인스타 앱을 열고 새 게시물 버튼을 누른다", venture: "노션대학 7일 챌린지 배포", minutes: 20 },
      { task: "구매대행 잠재 고객 1명에게 메시지 보내기", why: "사업은 이름이 아니라 첫 고객 대화에서 시작돼.", firstStep: "인스타 DM 창을 열고 떠오르는 1명을 검색한다", venture: "구매대행 브랜드 론칭", minutes: 10 },
      { task: "블로그에 레스토랑 에피소드 글 1편 발행하기", why: "발행 1회가 초고 10개보다 가치 있어.", firstStep: "블로그 앱을 열고 '글쓰기'를 누른다", venture: "블로그", minutes: 30 },
    ];

    const SHRINK_LADDER = [
      { suffix: " — 의 첫 10분만", why: "10분만 하고 그만둬도 합법이야. 타이머 켜고 가볍게 가자.", first: "아래 타이머의 시작 버튼을 누른다", min: 10 },
      { suffix: " — 딱 한 단위만", why: "전체 말고 '하나'만. 한 문장 쓰거나, 한 장 만들거나, 한 명한테만 보내면 완료야.", first: "그 '하나'가 뭔지 말해본다", min: 5 },
      { suffix: " — 관련 앱·파일 열고 첫 줄만", why: "시작의 90%는 여는 거야.", first: "홈 화면에서 그 앱을 찾아 누른다", min: 3 },
      { suffix: " — 앱만 열기", why: "여는 것만으로 도장 줄게.", first: "휴대폰을 들고 그 앱을 누른다", min: 1 },
      { suffix: " — 화면 켜기", why: "이건 못 할 수가 없어.", first: "화면을 켠다. 끝.", min: 1 },
    ];

    const TIME_OPTIONS = [
      { label: "10분", sub: "짬시간", value: 10 },
      { label: "30분", sub: "한 구간", value: 30 },
      { label: "1시간", sub: "제대로", value: 60 },
      { label: "2시간+", sub: "몰입", value: 120 },
    ];
    const ENERGY_OPTIONS = [
      { label: "🪫", sub: "방전", value: "low" },
      { label: "🙂", sub: "보통", value: "mid" },
      { label: "🔥", sub: "쌩쌩", value: "high" },
    ];

    async function callEngineOnce(userPrompt) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 25000);
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: ctrl.signal,
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: BASE_CONTEXT + "\n\n" + userPrompt }],
          }),
        });
        const data = await res.json();
        if (data.error || !data.content) throw new Error(data.error ? data.error.message : "no content");
        const text = data.content.filter((b) => b.type === "text").map((b) => b.text).join("\n");
        const clean = text.replace(/```json|```/g, "").trim();
        const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
        if (s === -1 || e === -1) throw new Error("no json");
        const obj = JSON.parse(clean.slice(s, e + 1));
        if (!obj.task || !obj.firstStep) throw new Error("bad json");
        return obj;
      } finally {
        clearTimeout(timer);
      }
    }
    async function callEngine(userPrompt) {
      try { return await callEngineOnce(userPrompt); }
      catch (e1) {
        await new Promise((r) => setTimeout(r, 800));
        return await callEngineOnce(userPrompt);
      }
    }

    function QuantumOne() {
      const [screen, setScreen] = useState("loading");
      const [state, setState] = useState({ history: [], currentTask: null, shrinkCount: 0, projects: DEFAULT_PROJECTS, blocked: [] });
      const [time, setTime] = useState(null);
      const [energy, setEnergy] = useState(null);
      const [outputLine, setOutputLine] = useState("");
      const [blockReason, setBlockReason] = useState("");
      const [showBlockInput, setShowBlockInput] = useState(false);
      const [notice, setNotice] = useState("");
      const [workingMsg, setWorkingMsg] = useState("");
      const [pName, setPName] = useState("");
      const [pDate, setPDate] = useState("");
      const [editId, setEditId] = useState(null);
      const [editName, setEditName] = useState("");
      const [editDate, setEditDate] = useState("");
      const [justEvolved, setJustEvolved] = useState(false);
      const [elapsed, setElapsed] = useState(0);
      const [timerOn, setTimerOn] = useState(false);
      const tickRef = useRef(null);
      const mounted = useRef(true);

      useEffect(() => {
        mounted.current = true;
        (async () => {
          try {
            const r = await window.storage.get("qone-state-v2");
            if (r && r.value && mounted.current) {
              const saved = JSON.parse(r.value);
              if (!saved.projects) saved.projects = DEFAULT_PROJECTS;
              if (!saved.blocked) saved.blocked = [];
              setState(saved);
              setScreen(saved.currentTask ? "task" : "home");
              return;
            }
          } catch (e) { }
          if (mounted.current) setScreen("home");
        })();
        return () => { mounted.current = false; if (tickRef.current) clearInterval(tickRef.current); };
      }, []);

      useEffect(() => {
        if (timerOn) {
          tickRef.current = setInterval(() => setElapsed((s) => s + 1), 1000);
        } else if (tickRef.current) {
          clearInterval(tickRef.current);
          tickRef.current = null;
        }
        return () => { if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; } };
      }, [timerOn]);
      const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

      const persist = async (next) => {
        setState(next);
        try { await window.storage.set("qone-state-v2", JSON.stringify(next)); } catch (e) { console.error(e); }
      };

      const history = state.history || [];
      const projects = state.projects || [];
      const blocked = state.blocked || [];
      const total = history.length;
      const stageIdx = getStageIdx(total);
      const stage = DOG_STAGES[stageIdx];
      const toNext = nextStageAt(total);
      const doneDates = [...new Set(history.map((h) => h.date))].sort();
      const doneToday = doneDates.includes(todayKey());
      let streak = 0;
      if (doneDates.length) {
        const gap = daysBetween(doneDates[doneDates.length - 1], todayKey());
        if (gap <= 1) {
          streak = 1;
          for (let i = doneDates.length - 1; i > 0; i--) {
            if (daysBetween(doneDates[i - 1], doneDates[i]) === 1) streak++;
            else break;
          }
        }
      }
      const sortedProjects = [...projects].sort((a, b) => {
        const da = dday(a.deadline), db = dday(b.deadline);
        if (da === null && db === null) return 0;
        if (da === null) return 1;
        if (db === null) return -1;
        return da - db;
      });
      const urgent = sortedProjects.find((p) => p.deadline);

      const stampGrid = (() => {
        const counts = {};
        history.forEach((h) => { counts[h.date] = (counts[h.date] || 0) + 1; });
        const now = new Date();
        const cells = [];
        for (let i = 34; i >= 0; i--) {
          const d = new Date(now); d.setDate(now.getDate() - i);
          const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
          cells.push({ key, n: counts[key] || 0 });
        }
        return cells;
      })();

      const getTask = async () => {
        setScreen("working");
        setWorkingMsg("단추가 냄새를 맡는 중");
        setNotice("");
        const projLines = sortedProjects.map((p) => `- ${p.name} [${ddayLabel(p.deadline)}${p.deadline ? ", 마감 " + p.deadline : ""}]${p.note ? " — " + p.note : ""}`).join("\n") || "(등록된 목표 없음)";
        const recent = history.slice(-7).map((h) => `- [${h.venture}] ${h.task} → 결과: ${h.output}`).join("\n") || "(아직 없음)";
        const blockedLines = blocked.map((b) => `- "${b.task.task}" — 멈춘 사유: ${b.reason}`).join("\n") || "(없음)";
        const prompt = `오늘 날짜: ${todayKey()}
하젤이 직접 등록한 큰 목표와 마감일:
${projLines}

잠시 멈춘 퀘스트:
${blockedLines}

지금 상황: 시간 ${time}분, 에너지 ${energy === "low" ? "방전" : energy === "mid" ? "보통" : "쌩쌩"}.
최근 완료한 행동들:
${recent}

마감 규칙을 지켜서 지금 가장 중요한 행동 1개를 JSON으로.`;
        try {
          const t = await callEngine(prompt);
          const task = { ...t, minutes: Math.min(Number(t.minutes) || time, time) };
          await persist({ ...state, currentTask: task, shrinkCount: 0 });
        } catch (e) {
          const blockedNames = blocked.map((b) => (b.task.venture || "") + b.task.task).join(" ");
          const target = sortedProjects.find((p) => p.deadline && !blockedNames.includes(p.name));
          const fb = target
            ? { task: `${target.name} — 다음 한 걸음을 ${Math.min(time, 30)}분 전진시키기`, why: `지금 가장 급한 건 ${target.name} (${ddayLabel(target.deadline)}).`, firstStep: "이 목표에 필요한 파일이나 앱을 연다", venture: target.name, minutes: Math.min(time, 30) }
            : FALLBACK_TASKS[Math.floor(Math.random() * FALLBACK_TASKS.length)];
          await persist({ ...state, currentTask: fb, shrinkCount: 0 });
          setNotice("연결이 잠깐 느려서 수첩이 직접 퀘스트를 골랐어. 다음 뽑기는 정상일 거야!");
        }
        setElapsed(0); setTimerOn(false);
        setScreen("task");
      };

      const shrink = async () => {
        const cur = state.currentTask;
        if (!cur) return;
        const count = state.shrinkCount || 0;
        const base = (cur.baseTask || cur.task).split(" — ")[0];
        const rung = SHRINK_LADDER[Math.min(count, SHRINK_LADDER.length - 1)];
        await persist({
          ...state,
          currentTask: { ...cur, baseTask: base, task: base + rung.suffix, why: rung.why, firstStep: rung.first, minutes: rung.min },
          shrinkCount: count + 1,
        });
      };

      const complete = async () => {
        if (!outputLine.trim()) return;
        setTimerOn(false);
        const cur = state.currentTask;
        const before = getStageIdx(total);
        const entry = { date: todayKey(), task: cur.task, venture: cur.venture, output: outputLine.trim(), spent: elapsed > 0 ? Math.round(elapsed / 60) : null };
        setJustEvolved(getStageIdx(total + 1) !== before);
        await persist({ ...state, history: [...history, entry], currentTask: null, shrinkCount: 0 });
        setOutputLine("");
        setScreen("done");
      };

      const blockTask = async () => {
        if (!blockReason.trim()) return;
        setTimerOn(false);
        const entry = { id: "b" + Date.now(), task: state.currentTask, reason: blockReason.trim(), date: todayKey() };
        await persist({ ...state, blocked: [...blocked, entry], currentTask: null, shrinkCount: 0 });
        setBlockReason(""); setShowBlockInput(false);
        setTime(null); setEnergy(null);
        setScreen("home");
      };
      const resolveBlock = async (id, resume) => {
        const item = blocked.find((b) => b.id === id);
        const rest = blocked.filter((b) => b.id !== id);
        if (resume && item) {
          const t = { ...item.task, why: "멈췄던 게 풀렸어! 식기 전에 바로 이어가자.", minutes: item.task.minutes || 30 };
          await persist({ ...state, blocked: rest, currentTask: t, shrinkCount: 0 });
          setElapsed(0); setTimerOn(false);
          setScreen("task");
        } else {
          await persist({ ...state, blocked: rest });
        }
      };

      const abandon = async () => {
        setTimerOn(false);
        await persist({ ...state, currentTask: null, shrinkCount: 0 });
        setTime(null); setEnergy(null); setShowBlockInput(false); setBlockReason("");
        setScreen("home");
      };

      const addProject = async () => {
        if (!pName.trim()) return;
        await persist({ ...state, projects: [...projects, { id: "p" + Date.now(), name: pName.trim(), deadline: pDate || "", note: "" }] });
        setPName(""); setPDate("");
      };
      const removeProject = async (id) => {
        await persist({ ...state, projects: projects.filter((p) => p.id !== id) });
        if (editId === id) setEditId(null);
      };
      const startEdit = (p) => { setEditId(p.id); setEditName(p.name); setEditDate(p.deadline || ""); };
      const saveEdit = async () => {
        if (!editName.trim()) return;
        await persist({ ...state, projects: projects.map((p) => (p.id === editId ? { ...p, name: editName.trim(), deadline: editDate || "" } : p)) });
        setEditId(null);
      };

      const css = `
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap');
        .q1 * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .q1 { min-height: 100vh; background: #EFE6D2;
              background-image: radial-gradient(rgba(123,103,73,0.10) 1px, transparent 1px);
              background-size: 17px 17px;
              color: #5B4A38; font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; font-size: 14px;
              display: flex; flex-direction: column; align-items: center; padding: 22px 16px 60px; }
        .q1 .book { width: 100%; max-width: 440px; }
        .q1 .head { text-align: center; margin-bottom: 16px; }
        .q1 .head h1 { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 30px; color: #4A3B2A; line-height: 1.2; }
        .q1 .head .sub { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-size: 15px; color: #9A8A6F; }
        .q1 .paper { background: #FFFDF6; border: 1.5px solid #DCCFB2; border-radius: 14px; box-shadow: 0 3px 0 #DCCFB2, 0 12px 26px rgba(91,74,56,0.10); }
        .q1 .tape { position: absolute; top: -11px; left: 50%; transform: translateX(-50%) rotate(-2.5deg); width: 86px; height: 24px; border-radius: 3px; opacity: .92; box-shadow: 0 2px 4px rgba(91,74,56,0.18); }
        .q1 .tape.mint { background: repeating-linear-gradient(45deg, #BCD9C8 0 7px, #CDE5D7 7px 14px); }
        .q1 .tape.pink { background: repeating-linear-gradient(45deg, #EFC3BC 0 7px, #F5D4CE 7px 14px); }
        .q1 .dogbox { position: relative; display: flex; align-items: center; gap: 10px; padding: 18px 16px 14px; margin-bottom: 14px; }
        .q1 .doginfo { flex: 1; }
        .q1 .dogname { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 21px; color: #4A3B2A; }
        .q1 .dogtitle { font-size: 12px; color: #9A8A6F; margin: 1px 0 9px; }
        .q1 .bonebar { height: 10px; background: #EFE6D2; border-radius: 99px; border: 1.5px solid #DCCFB2; overflow: hidden; }
        .q1 .bonefill { height: 100%; background: linear-gradient(90deg, #E8B95C, #D9A441); border-radius: 99px; transition: width .6s ease; }
        .q1 .bonetxt { font-size: 11px; color: #9A8A6F; margin-top: 5px; }
        .q1 .danchu-idle { animation: breathe 3.2s ease-in-out infinite; transform-origin: 50% 90%; }
        @keyframes breathe { 0%,100% { transform: scale(1);} 50% { transform: scale(1.025);} }
        .q1 .danchu-bounce { animation: bounce .7s ease-in-out infinite; transform-origin: 50% 100%; }
        @keyframes bounce { 0%,100% { transform: translateY(0);} 40% { transform: translateY(-7px) rotate(-2deg);} }
        .q1 .tail { transform-origin: 97px 78px; animation: wag 0.9s ease-in-out infinite; }
        @keyframes wag { 0%,100% { transform: rotate(0);} 50% { transform: rotate(14deg);} }
        .q1 .strip { display: flex; padding: 12px 4px; margin-bottom: 12px; }
        .q1 .strip > div { flex: 1; text-align: center; }
        .q1 .strip > div + div { border-left: 1.5px dashed #DCCFB2; }
        .q1 .strip b { display: block; font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 24px; color: #B5563C; }
        .q1 .strip i { font-style: normal; font-size: 10.5px; color: #9A8A6F; }
        .q1 .stampbook { padding: 13px 15px 12px; margin-bottom: 12px; }
        .q1 .stampbook h5 { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-size: 15px; color: #7B6749; margin-bottom: 8px; }
        .q1 .sgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .q1 .scell { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 1.5px dashed #D8CBAE; display: flex; align-items: center; justify-content: center; }
        .q1 .scell.got { border: none; background: radial-gradient(circle, #C75146 58%, #B5402F 100%); box-shadow: inset 0 0 0 2px #FFFDF6, inset 0 0 0 3.5px #C75146; }
        .q1 .scell.got::after { content: "잘"; font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-size: 11px; color: #FFF3EC; font-weight: 700; }
        .q1 .bigbtn { width: 100%; padding: 18px; border: none; border-radius: 16px; cursor: pointer; background: #C75146; color: #FFF7F0; font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 21px; box-shadow: 0 4px 0 #9E3B2C, 0 12px 24px rgba(199,81,70,0.3); }
        .q1 .ghost { width: 100%; padding: 12px; margin-top: 11px; border-radius: 12px; cursor: pointer; background: transparent; border: 1.5px dashed #C9BB9C; color: #8B7C63; font-size: 13.5px; }
        .q1 .row2 { display: flex; gap: 9px; margin-top: 14px; }
        .q1 .okbtn { flex: 1.5; padding: 15px; border: none; border-radius: 13px; cursor: pointer; background: #C75146; color: #FFF7F0; font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 17px; box-shadow: 0 4px 0 #9E3B2C; }
        .q1 .easybtn { flex: 1; padding: 15px 6px; border: 1.5px solid #D9A441; border-radius: 13px; cursor: pointer; background: #FBF3DD; color: #A8770F; font-size: 13px; font-family: 'Gowun Dodum', sans-serif; box-shadow: 0 3px 0 #D9A441; }
        .q1 .pausebtn { width: 100%; margin-top: 9px; padding: 12px; border: 1.5px dashed #B0A289; border-radius: 12px; cursor: pointer; background: rgba(255,253,246,0.6); color: #7B6F5A; font-size: 12.5px; }
        .q1 .quest { position: relative; padding: 28px 22px 20px; margin-top: 22px; transform: rotate(-0.5deg); background: repeating-linear-gradient(0deg, transparent 0 29px, rgba(123,103,73,0.09) 29px 30px), #FFFDF6; }
        .q1 .vtag { display: inline-block; font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-size: 13.5px; color: #6F8A66; background: #EBF2E4; border: 1.5px solid #C7D8BB; border-radius: 99px; padding: 3px 12px; }
        .q1 .tasktitle { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 24px; line-height: 1.45; margin: 12px 0 10px; color: #3F3527; }
        .q1 .why { font-size: 13.5px; line-height: 1.8; color: #7B6F5A; margin-bottom: 14px; }
        .q1 .first { background: #FBF3DD; border: 1.5px dashed #E0C588; border-radius: 11px; padding: 11px 13px; font-size: 13.5px; line-height: 1.65; }
        .q1 .timer { display: flex; align-items: center; gap: 10px; margin-top: 13px; padding: 11px 14px; background: #F5EEDC; border: 1.5px solid #DCCFB2; border-radius: 12px; }
        .q1 .timer .t { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 25px; color: #4A3B2A; letter-spacing: 0.06em; min-width: 76px; }
        .q1 textarea, .q1 input[type=text], .q1 input[type=date] { width: 100%; background: #FFFDF6; border: 1.5px solid #DCCFB2; border-radius: 11px; color: #5B4A38; padding: 12px; font-size: 14px; }
        .q1 .qlabel { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 16px; color: #7B6749; margin: 20px 0 8px; }
        .q1 .opt { background: #FFFDF6; border: 1.5px solid #DCCFB2; border-radius: 12px; padding: 13px 6px; text-align: center; cursor: pointer; color: #5B4A38; box-shadow: 0 2px 0 #DCCFB2; }
        .q1 .opt b { display: block; font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 18px; }
        .q1 .opt.on { border-color: #C75146; background: #FAEAE5; box-shadow: 0 2px 0 #C75146; color: #8E3B2C; }
        .q1 .proj { padding: 12px 13px; margin-bottom: 9px; }
        .q1 .proj .top { display: flex; align-items: center; gap: 8px; }
        .q1 .proj .nm { flex: 1; font-size: 13.5px; line-height: 1.5; }
        .q1 .dd { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 12px; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
        .q1 .dd.hot { background: #FAE3DE; color: #B5402F; border: 1.5px solid #E8AFA3; }
        .q1 .bigstamp { width: 148px; height: 148px; border-radius: 50%; margin: 6px auto 0; border: 5px solid #C75146; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #C75146; transform: rotate(-12deg); box-shadow: inset 0 0 0 3px #FFFDF6, inset 0 0 0 5px #C75146; }
        .q1 .bigstamp .a { font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-weight: 700; font-size: 31px; line-height: 1.15; }
        .q1 .motto { text-align: center; font-family: 'Gaegu', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', cursive; font-size: 14px; color: #A89B82; margin-top: 24px; line-height: 1.7; }
      `;

      const ddClass = (dl) => {
        const n = dday(dl);
        if (n === null) return "cool";
        if (n <= 7) return "hot";
        return "warm";
      };

      if (screen === "loading") return <div className="q1"><style>{css}</style><div className="book"><div style={{textAlign:"center",padding:"40px 0"}}><Danchu stageIdx={stageIdx} happy /></div></div></div>;
      if (screen === "home") return <div className="q1"><style>{css}</style><div className="book"><div className="head"><h1>하젤의 모험 수첩</h1><div className="sub">오늘도 딱 하나만, 꾸준히</div></div><div className="dogbox paper"><div className="tape mint"></div><Danchu stageIdx={stageIdx} /><div className="doginfo"><div className="dogname">단추 <span style={{fontSize:13,color:"#9A8A6F"}}>Lv.{stageIdx+1}</span></div><div className="dogtitle">{stage.title}</div><div className="bonebar"><div className="bonefill" style={{width:toNext!==null?`${(1-toNext/(DOG_STAGES[stageIdx+1].min-stage.min))*100}%`:"100%"}}></div></div><div className="bonetxt">🦴 뼈다귀 {total}개{toNext!==null?` · 다음 성장까지 ${toNext}개`:""}</div></div></div><div className="strip paper"><div><b>{streak}</b><i>연속 일수</i></div><div><b>{total}</b><i>받은 도장</i></div><div><b>{doneToday?"🐾":"···"}</b><i>오늘</i></div></div><div className="stampbook paper"><h5>도장판</h5><div className="sgrid">{stampGrid.map((c)=>(<div key={c.key} className={"scell"+(c.n>0?" got":"")+(c.key===todayKey()?" today":"")}></div>))}</div></div>{urgent&&<div className="proj paper" onClick={()=>setScreen("projects")} style={{cursor:"pointer"}}><div className="top"><div className="nm">🎯 {urgent.name}</div><span className={"dd "+ddClass(urgent.deadline)}>{ddayLabel(urgent.deadline)}</span></div></div>}{blocked.length>0&&<><div className="qlabel">⏸ 잠시 멈춘 퀘스트</div>{blocked.map((b)=>(<div className="proj paper" key={b.id}><div className="nm">{b.task.task}</div><div style={{fontSize:11,color:"#9A8A6F",marginTop:5}}>이유: {b.reason}</div><div style={{display:"flex",gap:5,marginTop:8}}><button style={{flex:1,padding:8,borderRadius:8,border:"none",background:"#7E9B6E",color:"#FFF",cursor:"pointer",fontSize:12}} onClick={()=>resolveBlock(b.id,true)}>해결됐어!</button><button style={{flex:1,padding:8,borderRadius:8,border:"1.5px solid #DDD",background:"#FFF",cursor:"pointer",fontSize:12}} onClick={()=>resolveBlock(b.id,false)}>지우기</button></div></div>))}</>}<div style={{marginTop:16}}><button className="bigbtn" onClick={()=>setScreen("ask")}>{doneToday?"오늘 하나 더!":"오늘의 퀘스트 받기"}</button></div>{history.length>0&&<div style={{marginTop:20}}><div className="qlabel">최근 완료</div>{history.slice(-5).reverse().map((h,i)=>(<div key={i} style={{padding:"8px 0",borderBottom:"1px dashed #DDD",fontSize:12}}><span style={{fontFamily:"Gaegu",color:"#B5563C",fontWeight:700}}>{h.date.slice(5)}</span> {h.output}</div>))}</div>}<div className="motto">조금씩 꾸준히 🐾</div></div></div>;
      if (screen === "ask") return <div className="q1"><style>{css}</style><div className="book"><div className="head"><h1>하젤의 모험 수첩</h1><div className="sub">지금의 하젤은 어때?</div></div><div className="qlabel">쓸 수 있는 시간</div><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9}}>{TIME_OPTIONS.map((o)=>(<button key={o.value} className={"opt"+(time===o.value?" on":"")} onClick={()=>setTime(o.value)}><b>{o.label}</b><i>{o.sub}</i></button>))}</div><div className="qlabel">에너지</div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>{ENERGY_OPTIONS.map((o)=>(<button key={o.value} className={"opt"+(energy===o.value?" on":"")} onClick={()=>setEnergy(o.value)}><b>{o.label}</b><i>{o.sub}</i></button>))}</div><div style={{marginTop:24}}><button className="bigbtn" disabled={!time||!energy} onClick={getTask}>퀘스트 뽑기 🐾</button></div></div></div>;
      if (screen === "task" && state.currentTask) { const t = state.currentTask; return <div className="q1"><style>{css}</style><div className="book"><div className="head"><h1>하젤의 모험 수첩</h1></div><div className="quest paper"><div className="tape pink"></div><span className="vtag">{t.venture}</span><div className="tasktitle">{t.task}</div><div className="why">{t.why}</div><div className="first"><b>지금 당장</b> {t.firstStep}</div></div><div className="timer"><span className="t">{fmt(elapsed)}</span><button style={{padding:"9px 16px",borderRadius:9,border:"none",background:timerOn?"#C9BB9C":"#7E9B6E",color:"#FFF",cursor:"pointer",fontSize:13}} onClick={()=>setTimerOn(!timerOn)}>{timerOn?"멈춤":"시작"}</button></div><div className="qlabel">다 했다면 — 한 줄</div><textarea value={outputLine} onChange={(e)=>setOutputLine(e.target.value)} placeholder="예: 서류 조립 끝!"></textarea><div className="row2"><button className="okbtn" disabled={!outputLine.trim()} onClick={complete}>도장 쾅</button><button className="easybtn" onClick={shrink}>너무 커<br/>쉽게 해</button></div>{!showBlockInput?<button className="pausebtn" onClick={()=>setShowBlockInput(true)}>⏸ 지금은 못 해요</button>:<div style={{marginTop:10}}><input type="text" value={blockReason} onChange={(e)=>setBlockReason(e.target.value)} placeholder="예: 프린터 없어서"/><div className="row2" style={{marginTop:9}}><button className="pausebtn" disabled={!blockReason.trim()} style={{marginTop:0,flex:1.5}} onClick={blockTask}>멈춰두기</button><button className="ghost" style={{marginTop:0,flex:1}} onClick={()=>{setShowBlockInput(false);setBlockReason("")}}>취소</button></div></div>}<button className="ghost" onClick={abandon}>여기까지</button></div></div>; }
      if (screen === "done") return <div className="q1"><style>{css}</style><div className="book" style={{textAlign:"center",padding:"40px 0"}}><div className="bigstamp"><span className="a">참<br/>잘했어요</span></div><div style={{marginTop:18}}><Danchu stageIdx={stageIdx} happy size={100}/></div><div style={{fontFamily:"Gaegu",fontWeight:700,fontSize:19,marginTop:8,color:"#4A3B2A"}}>단추가 뼈다귀를 받았어요 🦴</div><div style={{fontSize:11,color:"#A89B82",marginTop:8}}>연속 {streak}일 · 도장 {total}개</div><div style={{marginTop:24}}><button className="bigbtn" onClick={()=>{setTime(null);setEnergy(null);setScreen("home")}}>수첩으로</button></div></div></div>;
      if (screen === "working") return <div className="q1"><style>{css}</style><div className="book" style={{textAlign:"center",padding:"40px 0"}}><Danchu stageIdx={stageIdx} happy size={130}/><div style={{fontFamily:"Gaegu",fontWeight:700,fontSize:20,marginTop:8}}>{workingMsg}…</div></div></div>;
      if (screen === "projects") return <div className="q1"><style>{css}</style><div className="book"><div className="head"><h1>하젤의 모험 수첩</h1><div className="sub">큰 목표 & 마감일</div></div>{sortedProjects.map((p)=>(<div className="proj paper" key={p.id}><div className="top"><div className="nm">{p.name}{p.note?<div style={{fontSize:11,color:"#9A8A6F"}}>{p.note}</div>:null}</div><span className={"dd "+ddClass(p.deadline)}>{ddayLabel(p.deadline)}</span><button className="ghost" style={{padding:"6px 10px",fontSize:12}} onClick={()=>removeProject(p.id)}>✕</button></div></div>))}<div className="qlabel">새 목표 적기</div><input type="text" placeholder="목표 이름" value={pName} onChange={(e)=>setPName(e.target.value)}/><input type="date" value={pDate} onChange={(e)=>setPDate(e.target.value)} style={{marginTop:9}}/><button className="bigbtn" style={{marginTop:14}} onClick={addProject} disabled={!pName.trim()}>추가</button></div></div>;
      return <div className="q1"><style>{css}</style><div className="book" style={{textAlign:"center",padding:"40px 0"}}><button className="bigbtn" onClick={()=>setScreen("home")}>수첩으로</button></div></div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<QuantumOne />);
  </script>
</body>
</html>
